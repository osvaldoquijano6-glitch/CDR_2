  - numero: 1
    prueba: Medición de componentes y distorsión armónica.
    criterio: 'Desbalance de tensión, variaciones de tensión, severidad de parpadeo, contenido armónico, inyección de corriente
      directa del Centro de Carga con el sistema eléctrico.


      Efecto de variación de voltaje ocasionados por la conexión y desconexión de grandes elementos (motores, hornos de arco,
      sistemas de transporte) en los Centros de Carga.'
    responsable: null
    comentarios: 'Se repite con la actividad 6


      Cumplimiento de calidad de la energía con base a las tablas 3.8.A, 3.8.B, 3.8.C, 3.8.D, 3.8.e'
  - numero: 2
    prueba: Medición de flicker de cargas eléctricas.
    criterio: Verificar y validar las variaciones de tensión y la severidad de parpadeo, por los fenómenos ocasionados por
      la conexión de cargas cíclicas como hornos eléctricos o por oscilaciones subarmónicas.
    responsable: null
    comentarios: 'Se repite con la actividad 6


      Cumplimiento de calidad de la energía con base a las tablas 3.8.A, 3.8.B, 3.8.C, 3.8.D, 3.8.e'
  - numero: 3
    prueba: Medición del factor de potencia.
    criterio: Verificar y validar que el Centro de Carga debe mantener un factor de potencia entre 0.95 en atraso y 1.0, con
      medición cinco-minutal. Dichos Centros de Carga deberán cumplir con este requerimiento al menos el 95% del tiempo durante
      un periodo mensual.
    responsable: null
    comentarios: "Se repite con la actividad 6 \n\nEn Estado Operativo Normal, los Centros de Carga conectados en Alta Tensión\
      \ deberán mantener un factor de potencia entre 0.95 en atraso y 1.0, con medición cinco-minutal."
  - numero: 4
    prueba: 'Esquemas de Protección y Control. El CENACE verificará y validará:'
    criterio: 'Instalación de los equipos necesarios para los Esquemas de Acción Remedial y Esquemas de Protección de Sistema
      para usuarios en la RNT y las RGD del MEM, y


      Esquemas de Protección de Sistema, frecuencia y voltaje, se encuentren ajustados de acuerdo con lo determinado en los
      estudios elaborados por el CENACE.'
    responsable: null
    comentarios: 'Se repite con la actividad 6


      validación de Protecciones por parte del transportista y Distribuidor:


      i. Detección de fallas internas y externas a la Red Particular;

      ii. Operación ante baja y alta tensión;

      iii. Operación ante baja y alta frecuencia;

      iv. Operación ante sobrecarga de circuitos;

      v. Operación ante sobrecarga de transformadores, y

      vi. Operación de protecciones de respaldo.'
  - numero: 5
    prueba: 'Elementos de Compensación dinámicos. El CENACE verificará y validará:'
    criterio: El modelo matemático, diagramas de bloque, funciones de transferencia del control y parámetros de los elementos
      de compensación dinámicos en las instalaciones de los Centros de Carga que representen con precisión el comportamiento
      dinámico ante cambios en las variables eléctricas del sistema eléctrico de potencia y de la carga propia.
    responsable: null
    comentarios: 'Se repite con la actividad 6


      Modelos de simulación en caso de ser Centro de Carga Especial.'
  - numero: 6
    prueba: 'Pruebas de cumplimiento del Código de Red para Centros de Carga que tienen por objeto verificar que la respuesta
      del modelo matemático, diagramas de bloque y funciones de transferencia del Centro de Carga representen el comportamiento
      real y el cumplimento de:'
    criterio: 'Disposiciones Generales de conexión de Centros de Carga;

      Manual Regulatorio de Coordinación Operativa;

      Disposiciones Generales para la operación en Estado Operativo Normal del SEN, y

      Manual Regulatorio de requerimientos técnicos para la Conexión de Centros de Carga: tensión, frecuencia, corto circuito,
      requerimiento de factor de potencia, protecciones, control, intercambio de información y calidad de la energía.'
    responsable: null
    comentarios: null
