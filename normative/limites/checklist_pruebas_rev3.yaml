- categoria: PRUEBAS POR UNIDAD
  sistema: SISTEMA DE CONTROL DE TENSIÓN POR UNIDAD
  condicion: EN VACÍO
  'no': 1
  prueba: Rango Operativo de Tensión
  criterio: 'Debe controlar

    90% < V < 110%'
  tipo: EN SITIO
  senales: 'VOLTAJE DEL GENERADOR (Vg).

    VOLTAJE DE CAMPO O EXCITACIÓN (Vf). CORRIENTE DE CAMPO O EXCITACIÓN (If). COSIGNA DE VOLTAJE DEL GENERADOR (Vgsp)'
  extra:
  - SI
  - SI
  - 'Durante pruebas preliminares se verificó que el AVR regulara correctamente la tensión dentro de un rango de ±10% respecto
    al valor nominal.

    Sin embargo, se identificó que el modo manual de control de excitación no está disponible mediante interfaz local, siendo
    accesible únicamente a través del software propietario del AVR.

    ¿Es aceptable que el modo manual esté disponible solo vía software, o se requiere contar con un esquema de conmutación
    local y permanente entre modos automático y manual?'
  - No se tiene inconveniente en que el control sobra la actualizacion de la referencia de tension se realice medinete el
    Software del fabricante, sin embargo sera necesari contar con la participacion del personal especialista al momento de
    realizar la prueba en sitio.
