# =============================================================================
# TABLAS DE REFERENCIA — Código de Red 2.0 (RES/550/2021, DOF 31-dic-2021)
# Fuente: catálogos de pruebas validados por el usuario (01/02/03 *.md),
# que transcriben el Manual INTE, POC/Anexo 5 y Manual CONE.
# Estado: VALIDADO (transcripción de fuente primaria vía catálogo propio).
# Estas tablas alimentan etapas E3/E4; las pruebas ya implementadas llevan
# sus límites inline en matriz_pruebas.yaml.
# =============================================================================

version: "1.0.0"
fuente: "Manual INTE CdR 2.0 [1], POC/Anexo 5 [2], Manual CONE [1-CONE]"

# ── Clasificación de Centrales (Tabla 1.1, Manual INTE) ──────────────────────
clasificacion_centrales:   # P = Capacidad Instalada Neta (MW)
  SIN:   {A: [0, 0.5], B: [0.5, 10], C: [10, 30], D: [30, null]}
  SIBC:  {A: [0, 0.5], B: [0.5, 5],  C: [5, 20],  D: [20, null]}
  SIBCS: {A: [0, 0.5], B: [0.5, 3],  C: [3, 10],  D: [10, null]}
  SIM:   {A: [0, 0.5], B: [0.5, 1],  C: [1, 3],   D: [3, null]}
  # rango [min, max): min ≤ P < max; max null = sin tope

# ── Rango de regulación de P por tecnología (Tabla 2.2.2.B) ──────────────────
rango_regulacion_p_pct:
  carbon_pulverizado: [35, 100]
  combustoleo: [20, 100]
  gas_termo: [20, 100]
  biogas: [35, 100]
  paja_madera: [50, 100]
  carbon_solido: [50, 100]
  biomasa: [70, 100]
  motor_gas: [30, 100]      # 35 % sostenible al menos 5 min
  turbina_gas: [30, 95]
  ciclo_combinado: [35, 95]
  motor_diesel: [30, 100]   # 20 % al menos 5 min
  geotermica: [50, 100]
  eolica: [0, 100]
  fotovoltaica: [0, 100]
  hidroelectrica: [0, 100]
  nucleoelectrica: [50, 100]

# ── Huecos de tensión: Zona A, puntos (t_s, v_pu) (Cap. 4 Manual INTE) ───────
huecos_zona_a:
  sincrona_BC:    # Tabla 4.1.1.A
    inferior: [[0.00, 0.00], [0.25, 0.00], [0.25, 0.70], [0.70, 0.70], [1.50, 0.90]]
    superior: [[0.00, 1.20], [0.20, 1.20], [0.20, 1.10]]
  asincrona_BC:   # Tabla 4.1.1.B
    inferior: [[0.00, 0.00], [0.40, 0.00], [0.55, 0.35], [0.70, 0.70], [1.50, 0.90]]
    superior: [[0.00, 1.30], [0.20, 1.30], [0.20, 1.10]]
  sincrona_D:     # Tabla 4.2.1.A
    inferior: [[0.00, 0.00], [0.25, 0.00], [0.25, 0.25], [0.45, 0.25], [0.70, 0.50], [1.50, 0.90]]
    superior: [[0.00, 1.20], [0.20, 1.20], [0.20, 1.10]]
  asincrona_D:    # Tabla 4.2.1.B
    inferior: [[0.00, 0.00], [0.25, 0.00], [0.35, 0.00], [0.45, 0.00], [1.05, 0.45], [1.50, 0.90]]
    superior: [[0.00, 1.30], [0.20, 1.30], [0.20, 1.10]]
  recuperacion_p_postfalla_s: [0.25, 0.5]   # asíncronas B/C (4.1.2)

# ── Modos de control de Q — asíncronas B/C/D (3.5.3) ─────────────────────────
modos_control_q:
  comun: {t90_max_s: 3, t_estabilizacion_max_s: 5}
  tension_directo: {paso_max_pu: 0.01, error_max_pct: 0.5}
  tension_qv: {error_max_pct_q_calculada: 5}
  potencia_reactiva: {paso_max: "1 MVAr o 5 % de Qmax (el menor)"}
  factor_potencia: {paso_max: 0.002, error_max_pct: 0.1}
  consigna_v: {rango_pu: [0.95, 1.05], banda_muerta_max_pct: 1}
  prioridad_falla: {q_establecer_max_s: 0.25, p_recuperar_max_s: 1.0}

# ── Perfil de potencia reactiva (Tabla 3.3.2) ────────────────────────────────
perfil_reactivos:
  obligatorio_q_pmax: 0.33   # área blanca ±0.33
  maximo_q_pmax: 0.5         # área gris ±0.5
  rango_v_pu: [0.95, 1.05]

# ── Centros de Carga (Manual CONE) ───────────────────────────────────────────
centros_carga:
  aplicabilidad:   # Tabla 1.1.A
    MT_menor_1MW: {tension: si, frecuencia: si, corto_circuito: si, fp: no,
                   protecciones: si, control: solo_rdc, tic: manual_tic,
                   calidad: solo_desbalances}
    MT_mayor_igual_1MW: {tension: si, frecuencia: si, corto_circuito: si, fp: si,
                         protecciones: si, control: solo_rdc, tic: manual_tic, calidad: si}
    AT: {tension: si, frecuencia: si, corto_circuito: si, fp: si,
         protecciones: si, control: solo_rdc, tic: manual_tic, calidad: si}
  tension:         # Tablas 2.1.A/B: % de Vnom
    permanente_pct: [95, 105]
    temporal_pct: [90, 110]
    temporal_max_min: 20
  frecuencia:      # numeral 2.2
    permanente_hz: [59.0, 61.0]
    temporal_hz: [58.0, 62.5]
    temporal_max_min: 30
    desviacion_maniobras_max_hz: 0.1
  factor_potencia: # numeral 2.4 — límite por vigencia
    vigencias:
      - {desde: "1900-01-01", fp_min: 0.95, fp_max: 1.0}
      - {desde: "2026-04-08", fp_min: 0.97, fp_max: 1.0}
    intervalo_min: 5
    cumplimiento_minimo_pct: 95
    periodo: mensual
  tdd:             # Tablas 2.8.A/B/C — límites % de IL por Icc/IL, armónicas IMPARES
    # rangos_h: [2<h<11, 11≤h<17, 17≤h<23, 23≤h<35, 35≤h≤50]; pares = 25 % del impar
    v_hasta_69kv:
      - {icc_il: [0, 20],      limites_h: [4.0, 2.0, 1.5, 0.6, 0.3],   datd: 5.0}
      - {icc_il: [20, 50],     limites_h: [7.0, 3.5, 2.5, 1.0, 0.5],   datd: 8.0}
      - {icc_il: [50, 100],    limites_h: [10.0, 4.5, 4.0, 1.5, 0.7],  datd: 12.0}
      - {icc_il: [100, 1000],  limites_h: [12.0, 5.5, 5.0, 2.0, 1.0],  datd: 15.0}
      - {icc_il: [1000, null], limites_h: [15.0, 7.0, 6.0, 2.5, 1.4],  datd: 20.0}
    v_69_a_161kv:
      - {icc_il: [0, 20],      limites_h: [2.0, 1.0, 0.75, 0.3, 0.15], datd: 2.5}
      - {icc_il: [20, 50],     limites_h: [3.5, 1.75, 1.25, 0.5, 0.25], datd: 4.0}
      - {icc_il: [50, 100],    limites_h: [5.0, 2.25, 2.0, 0.75, 0.35], datd: 6.0}
      - {icc_il: [100, 1000],  limites_h: [6.0, 2.75, 2.5, 1.0, 0.5],  datd: 7.5}
      - {icc_il: [1000, null], limites_h: [7.5, 3.5, 3.0, 1.25, 0.7],  datd: 10.0}
    v_mayor_161kv:
      - {icc_il: [0, 25],      limites_h: [1.0, 0.5, 0.38, 0.15, 0.1], datd: 1.5}
      - {icc_il: [25, 50],     limites_h: [2.0, 1.0, 0.75, 0.3, 0.15], datd: 2.5}
      - {icc_il: [50, null],   limites_h: [3.0, 1.5, 1.15, 0.45, 0.22], datd: 3.75}
    notas:
      pares_pct_de_impares: 25
      sin_corriente_directa: true
      hornos_arco_arranque_exceso_pct: 50
  flicker: {pst_max: 1.0, plt_max: 0.8, estadistico: p95_semanal}   # Tabla 3.8.D
  desbalance:
    tension_pct: {limite: 2.0, estadistico: p95_semanal_10min}
    corriente_pct: {limite: 15.0, estadistico: promedio_semanal_10min}
