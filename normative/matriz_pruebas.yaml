      - {f_min: 58.2, f_max: 58.8, t_min_s: null, t_capacidad_normativa_s: 1800}
      - {f_min: 57.0, f_max: 58.2, t_min_s: null, t_capacidad_normativa_s: 900}
      SIBCS_SIM:
      - {f_min: 61.8, f_max: 63.0, t_min_s: null, t_capacidad_normativa_s: 900}
      - {f_min: 61.2, f_max: 61.8, t_min_s: null, t_capacidad_normativa_s: 1800}
      - {f_min: 58.8, f_max: 61.2, t_min_s: null, t_capacidad_normativa_s: null}
      - {f_min: 58.2, f_max: 58.8, t_min_s: null, t_capacidad_normativa_s: 1800}
      - {f_min: 57.0, f_max: 58.2, t_min_s: null, t_capacidad_normativa_s: 900}
- id: CE-F-02
  legacy_id: P2
  nombre: Razón de cambio de frecuencia (ROCOF)
  aplica_a: CENTRAL_ELECTRICA
  categorias: [A, B, C, D]
  tecnologia: AMBAS
  manual_referencia: INTER
  numeral: 2.2.1 [1]; Prueba 2 Anexo 5 [2]
  fuente_documental: Manual INTE CdR 2.0 (RES/550/2021, DOF 31-dic-2021); POC/Anexo 5 CENACE — catálogo
    validado 01/02_pruebas*.md
  variables_requeridas: [timestamp, frequency, active_power]
  unidad_esperada: {frequency: Hz, rocof: Hz/s}
  fs_minima_sugerida_hz: 10
  duracion_minima: evento completo de rampa de frecuencia + estabilización
  criterio_aceptacion: 'La central permanece conectada y sin disparo ante eventos con ROCOF hasta el valor
    de inmunidad exigido.

    '
  formula_algoritmo: 'ROCOF(t) = df/dt calculado sobre ventana móvil configurable (parámetro ventana_rocof_ms);
    verificación de continuidad de P y ausencia de disparo durante y después del evento.

    '
  parametros_heredados: {rocof_inmunidad_hz_s: 2.0}
  evidencia_requerida: [serie f(t), serie ROCOF(t), P(t), marcado de evento]
  tipo_salida: [grafica, tabla, conclusion]
  resultados_posibles: *id001
  estado_normativo: VALIDADO
  dato_requerido: null
  observaciones: CdR 2.0 fija 2.5 Hz/s en ventana de 200 ms; protocolos previos usaban 2.0 Hz/s (discrepancia
    documentada en el catálogo). umbral_desconexion_mw se pasa por parámetros del proyecto.
  limites: {rocof_inmunidad_hz_s: 2.5, ventana_rocof_ms: 200}
- id: CE-F-03
  legacy_id: P3
  nombre: Respuesta ante alta frecuencia
  aplica_a: CENTRAL_ELECTRICA
  categorias: [A, B, C, D]
  tecnologia: AMBAS
  manual_referencia: INTER
  numeral: 2.2.2–2.2.4 [1]; Prueba 3 Anexo 5 [2]
  fuente_documental: Manual INTE CdR 2.0 (RES/550/2021, DOF 31-dic-2021); POC/Anexo 5 CENACE — catálogo
    validado 01/02_pruebas*.md
  variables_requeridas: [timestamp, frequency, active_power]
  unidad_esperada: {frequency: Hz, active_power: MW}
  fs_minima_sugerida_hz: 1
  duracion_minima: escalón de frecuencia + tiempo de establecimiento por caso de estatismo
  criterio_aceptacion: 'Reducción de potencia activa proporcional al estatismo configurado al superar
    el umbral de sobre-frecuencia, dentro de la tolerancia y tiempos exigidos.

    '
  formula_algoritmo: 'P_esperada(f) = P_op - (P_ref/S)*((f - f_umbral)/f_nom) por tramos (droop piecewise,
    pendiente referida a P_ref); error = P_medida - P_esperada; evaluación por zonas con tolerancia (semáforo
    del legado core/droop.py).

    '
  parametros_heredados:
    f_min_hz: 59.97
    f_max_hz: 62.7
    umbral_activacion_hz: 60.2
    estatismos: [0.03, 0.05, 0.08]
  evidencia_requerida: [f(t) y P(t) por caso, curva droop teórica vs medida, tabla de error por zona]
  tipo_salida: [grafica, tabla, conclusion]
  resultados_posibles: *id001
  estado_normativo: VALIDADO
  dato_requerido: null
  observaciones: 'Umbral 60.2 Hz (60.3 en SIM). La tolerancia de error P medida vs esperada (5 % Pref,
    90 % de muestras) es de PROTOCOLO, no normativa: el numeral exige proporcionalidad al estatismo sin
    tolerancia numérica.'
  limites:
    umbral_hz: 60.2
    umbral_hz_sim: 60.3
    estatismos_admisibles: [0.03, 0.05, 0.08]
    t_respuesta_max_s: 2
    tolerancia_pct_pref: 5.0
    cumplimiento_minimo_pct: 90.0
