      encima de la curva LVRT (o debajo de HVRT) y aporta corriente
      reactiva/recupera P según lo exigido.
    formula_algoritmo: >
      V RMS de secuencia positiva desde COMTRADE; comparación de trayectoria
      V(t) contra curva límite; verificación de continuidad y aporte durante
      hueco; recuperación de P post-falla.
    evidencia_requerida: [V(t) vs curva LVRT/HVRT, P/Q/I durante evento]
    tipo_salida: [grafica, tabla, conclusion]
    resultados_posibles: *resultados
    estado_normativo: PENDIENTE_VALIDACION_NORMATIVA
    dato_requerido: Curva LVRT/HVRT (puntos V-t), aporte de corriente reactiva y recuperación exigidos — numeral.
    observaciones: Normalmente se valida con simulación + registro de fallas reales; definir alcance de campo.

