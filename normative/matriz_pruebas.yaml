  tipo_salida: [grafica, tabla, conclusion]
  resultados_posibles: *id001
  estado_normativo: VALIDADO
  dato_requerido: null
  observaciones: t1 < 2 s (asíncronas; síncronas máx 2 s), t2 = 30 s, bm ±30 mHz, insensibilidad 0–15
