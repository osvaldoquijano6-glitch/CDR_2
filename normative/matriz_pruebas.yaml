# =============================================================================
# MATRIZ NORMATIVA MAESTRA DE PRUEBAS — versión inicial (FASE 1)
# Sistema de Verificación de Código de Red — Centrales Eléctricas y Centros de Carga
#
# REGLAS DE ESTA MATRIZ:
#   1. Ningún límite/umbral se inventa. Cada criterio cuantitativo debe tener
#      `fuente_documental` con documento + numeral + versión.
#   2. estado_normativo:
#        VALIDADO                        criterio con cita documental confirmada
#        HEREDADO_PROTOCOLO_SIN_CITA     valor usado en protocolos previos (código
#                                        legado core/droop.py, tests/registry.py);
#                                        requiere confirmación contra numeral
#        PENDIENTE_VALIDACION_NORMATIVA  falta el dato; `dato_requerido` describe
#                                        exactamente qué capturar
#   3. El motor de reglas emite NO_EVALUABLE si estado_normativo != VALIDADO,
#      aunque existan datos de medición suficientes.
#   4. IDs nuevos: CE-<dominio>-<nn> (central), CC-<nn> (centro de carga).
#      `legacy_id` conserva el mapeo con el Anexo 5 / proyecto anterior (P1..P28).
#
# Documentos de referencia (registrar versión y fecha DOF en normative/fuentes/):
#   COD_RED : Código de Red (disposiciones administrativas de carácter general)
#   INTER   : Manual Regulatorio de Requerimientos Técnicos para la
#             Interconexión de Centrales Eléctricas
#   CONE    : Manual Regulatorio de Requerimientos Técnicos para la Conexión
#             de Centros de Carga
#   POC_A5  : Procedimiento para la Declaración de Operación Comercial, Anexo 5
#   PROT    : Protocolo de pruebas aprobado por CENACE para la instalación
# =============================================================================

version: "0.1.0"
fecha: "2026-07-03"
resultados_posibles: &resultados [CUMPLE, NO_CUMPLE, NO_EVALUABLE, PENDIENTE_DOCUMENTAL]

pruebas:

