  - id: CE-F-01
    legacy_id: P1
    nombre: Rango de frecuencia
    aplica_a: CENTRAL_ELECTRICA
    categorias: [A, B, C, D]          # confirmar exigencia por categoría
    tecnologia: AMBAS
    manual_referencia: INTER
    numeral: null
    fuente_documental: null
    variables_requeridas: [timestamp, frequency, active_power]
    unidad_esperada: {frequency: Hz, active_power: MW}
    fs_minima_sugerida_hz: 1
    duracion_minima: por banda de frecuencia según tabla normativa
    criterio_aceptacion: >
      Operación continua sin desconexión dentro de las bandas de frecuencia y
      tiempos mínimos de permanencia definidos en la tabla del manual.
    formula_algoritmo: >
      Clasificar cada muestra en banda de frecuencia; acumular tiempo de
      permanencia por banda; verificar ausencia de desconexión (P > umbral de
      operación) durante la permanencia exigida.
    evidencia_requerida: [serie f(t) y P(t), tabla de permanencia por banda]
    tipo_salida: [grafica, tabla, conclusion]
    resultados_posibles: *resultados
    estado_normativo: PENDIENTE_VALIDACION_NORMATIVA
    dato_requerido: >
      Tabla de bandas de frecuencia (Hz) vs tiempo mínimo de operación por área
      síncrona y categoría, con numeral del Manual INTER / Código de Red.
    observaciones: El legado (P1) grafica sin comparar contra tabla de bandas.

  - id: CE-F-02
    legacy_id: P2
    nombre: Razón de cambio de frecuencia (ROCOF)
    aplica_a: CENTRAL_ELECTRICA
    categorias: [A, B, C, D]
    tecnologia: AMBAS
    manual_referencia: INTER
    numeral: null
    fuente_documental: null
    variables_requeridas: [timestamp, frequency, active_power]
    unidad_esperada: {frequency: Hz, rocof: Hz/s}
    fs_minima_sugerida_hz: 10          # df/dt no es confiable con fs < 10 Hz; confirmar método normativo
    duracion_minima: evento completo de rampa de frecuencia + estabilización
    criterio_aceptacion: >
      La central permanece conectada y sin disparo ante eventos con ROCOF hasta
      el valor de inmunidad exigido.
    formula_algoritmo: >
      ROCOF(t) = df/dt calculado sobre ventana móvil configurable (parámetro
      ventana_rocof_ms); verificación de continuidad de P y ausencia de disparo
      durante y después del evento.
    parametros_heredados:
      rocof_inmunidad_hz_s: 2.0        # de tests/registry.py "Razón de cambio 2.0 Hz/s"
    evidencia_requerida: [serie f(t), serie ROCOF(t), P(t), marcado de evento]
    tipo_salida: [grafica, tabla, conclusion]
    resultados_posibles: *resultados
    estado_normativo: HEREDADO_PROTOCOLO_SIN_CITA
    dato_requerido: >
      Numeral que fija el ROCOF de inmunidad (¿2.0 Hz/s?) y la ventana/método de
      cálculo de df/dt (ciclos, ms) exigidos.
    observaciones: null

  - id: CE-F-03
    legacy_id: P3
    nombre: Respuesta ante alta frecuencia
    aplica_a: CENTRAL_ELECTRICA
    categorias: [A, B, C, D]
    tecnologia: AMBAS
    manual_referencia: INTER
    numeral: null
    fuente_documental: null
    variables_requeridas: [timestamp, frequency, active_power]
    unidad_esperada: {frequency: Hz, active_power: MW}
    fs_minima_sugerida_hz: 1
    duracion_minima: escalón de frecuencia + tiempo de establecimiento por caso de estatismo
    criterio_aceptacion: >
      Reducción de potencia activa proporcional al estatismo configurado al
      superar el umbral de sobre-frecuencia, dentro de la tolerancia y tiempos
      exigidos.
    formula_algoritmo: >
      P_esperada(f) = P_op - (P_ref/S)*((f - f_umbral)/f_nom) por tramos (droop
      piecewise, pendiente referida a P_ref); error = P_medida - P_esperada;
      evaluación por zonas con tolerancia (semáforo del legado core/droop.py).
    parametros_heredados:               # de core/droop.py (PRUEBAS[3])
      f_min_hz: 59.97
      f_max_hz: 62.70
      umbral_activacion_hz: 60.20
      estatismos: [0.03, 0.05, 0.08]
    evidencia_requerida: [f(t) y P(t) por caso, curva droop teórica vs medida, tabla de error por zona]
    tipo_salida: [grafica, tabla, conclusion]
    resultados_posibles: *resultados
    estado_normativo: HEREDADO_PROTOCOLO_SIN_CITA
    dato_requerido: >
      Numeral con umbral de activación, estatismos admisibles, banda muerta
      máxima y tolerancia de la respuesta (% o MW) para sobre-frecuencia.
    observaciones: Casos multi-estatismo 3/5/8 % heredados del protocolo.

