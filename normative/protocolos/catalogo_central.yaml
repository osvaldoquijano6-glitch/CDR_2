    texto: Tabla. Ajustes relevadores
  - estilo: Normal
    texto: Cuando se integren los ajustes del relevador, se deberá indicar su equivalencia en por unidad
      para confirmar la correspondencia con los límites normativos de 0.90 pu, 0.95 pu, 1.05 pu y 1.10
      pu.
- seccion: '10'
  titulo: Prueba 10 - Capacidad de Potencia Reactiva
  no_aplica_en_plantilla: false
  flujo:
  - tabla: aplicabilidad
  - estilo: Normal
    texto: Objetivo
  - estilo: Normal
    texto: Esta prueba verifica que la Central Eléctrica Síncrona tipo B cuente con la capacidad de generar
      y absorber potencia reactiva, manteniendo su operación dentro del rango de factor de potencia requerido
      en el Punto de Interconexión.
  - estilo: Normal
    texto: El criterio de evaluación se toma del Anexo 5 del Procedimiento de Operación para la Declaración
      de Entrada en Operación Comercial de Centrales Eléctricas y Centros de Carga, en el apartado de
      pruebas por Central Eléctrica para Centrales Eléctricas Síncronas, donde se establece la prueba
      de Capacidad de Potencia Reactiva.
  - estilo: Normal
    texto: El fundamento técnico corresponde al Código de Red 2.0, dentro del Manual Regulatorio de Requerimientos
      Técnicos para la Interconexión de Centrales Eléctricas al Sistema Eléctrico Nacional, Capítulo 3,
      particularmente en la Sección 3.2.1 Capacidad de potencia reactiva para Centrales Eléctricas Síncronas
      tipo B, donde se establece la capacidad de mantener potencia reactiva en un rango de factor de potencia
      de al menos 0.95 en atraso y 0.95 en adelanto.
  - estilo: Normal
    texto: Condiciones y desarrollo de la prueba
  - estilo: List Paragraph
    texto: Verificar que la Central Eléctrica se encuentre sincronizada, en operación estable y con el
      sistema de control de tensión/reactivos disponible.
  - estilo: List Paragraph
    texto: Operar el generador en condición normal, entregando potencia activa y con potencia reactiva
      cercana a 0 kVAr como condición inicial.
  - estilo: List Paragraph
    texto: Llevar la unidad al punto de operación de 100% de carga, conforme a la capacidad disponible
      para la prueba.
  - estilo: List Paragraph
    texto: Ajustar la consigna para generar potencia reactiva, mantener la condición el tiempo necesario
      para estabilización y registrar las variables eléctricas.
  - estilo: List Paragraph
    texto: Ajustar la consigna para absorber potencia reactiva, mantener la condición el tiempo necesario
      para estabilización y registrar las variables eléctricas.
  - estilo: List Paragraph
    texto: Retornar la unidad a una condición cercana a la condición inicial.
  - estilo: List Paragraph
    texto: Repetir la evaluación al 75% de carga, generando y absorbiendo potencia reactiva.
  - estilo: List Paragraph
    texto: Repetir la evaluación al 50% de carga, generando y absorbiendo potencia reactiva.
  - estilo: List Paragraph
    texto: Verificar que, en los puntos evaluados, la Central Eléctrica mantenga capacidad de operación
      dentro del rango mínimo de factor de potencia requerido.
  - estilo: List Paragraph
    texto: Confirmar que no se presenten oscilaciones anormales, pérdida de control de tensión/reactivos
      o actuación indebida de protecciones.
  - estilo: Normal
    texto: Señales requeridas
  - estilo: Normal
    texto: Frecuencia
  - estilo: Normal
    texto: Potencia activa (P)
  - estilo: Normal
    texto: Potencia reactiva (Q)
  - estilo: Normal
    texto: Voltaje del generador (Vg)
  - estilo: Normal
    texto: Para recabar la información de la prueba se utilizará un adquisidor de datos HIOKI MR8847A,
      mediante el cual se registrarán las señales eléctricas requeridas durante la ejecución de la prueba,
      con capacidad de muestreo mínima de 20 muestras por segundo, equivalente a un intervalo de 50 ms
      por señal.
  - estilo: Normal
    texto: Criterio de aceptación
  - estilo: Normal
    texto: 'La prueba se considera satisfactoria cuando la Central Eléctrica Síncrona tipo B demuestra
      capacidad de operar en un rango de factor de potencia de al menos:'
  - estilo: Normal
    texto: y
  - estilo: Normal
    texto: en el Punto de Interconexión, conforme a los requerimientos aplicables del Código de Red.
  - estilo: Normal
    texto: Resultados de la prueba
  - estilo: Normal
    texto: La evidencia de esta prueba corresponderá al registro de potencia activa, potencia reactiva,
      voltaje del generador y frecuencia en los puntos de carga evaluados.
  - estilo: Normal
    texto: La información presentada permitirá calcular la potencia aparente y el factor de potencia para
      cada condición, verificando la capacidad de la Central Eléctrica para generar y absorber potencia
      reactiva conforme al rango mínimo requerido.
  - estilo: Normal
    texto: Los resultados se organizarán en una tabla de evaluación por nivel de carga, considerando como
      mínimo las condiciones de 100%, 75% y 50% de carga, tanto en generación como en absorción de potencia
      reactiva.
