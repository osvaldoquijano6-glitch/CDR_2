    texto: Gráfica. Reconexión Automática Rampa de toma de carga
- seccion: '5'
  titulo: Prueba 5 - Limitación Parcial de Potencia Activa
  no_aplica_en_plantilla: false
  flujo:
  - tabla: aplicabilidad
  - estilo: Normal
    texto: Objetivo
  - estilo: Normal
    texto: Esta prueba verifica que la Central Eléctrica responda correctamente a una consigna de reducción
      parcial de potencia activa, partiendo de un valor de generación distinto a su capacidad máxima,
      manteniéndose interconectada y en operación estable.
  - estilo: Normal
    texto: El criterio de evaluación se toma del Anexo 5 del Procedimiento de Operación para la Declaración
      de Entrada en Operación Comercial de Centrales Eléctricas y Centros de Carga, en el apartado de
      pruebas por Central Eléctrica para Centrales Eléctricas Síncronas, donde se establece la prueba
      de Limitación Parcial de Potencia Activa, con el criterio de alcanzar la consigna en el tiempo y
      tolerancia definidos por CENACE.
  - estilo: Normal
    texto: La prueba permite comprobar la capacidad de la central para modificar su aportación de potencia
      activa mediante una consigna de control, sin desconexión de la red ni pérdida de estabilidad operativa.
  - estilo: Normal
    texto: Condiciones y desarrollo de la prueba
  - estilo: List Paragraph
    texto: Verificar que la Central Eléctrica se encuentre sincronizada, interconectada y en operación
      estable.
  - estilo: List Paragraph
    texto: Operar la central en un valor de generación distinto a su capacidad máxima, conforme a la condición
      indicada por CENACE.
  - estilo: List Paragraph
    texto: En caso de no contar con una consigna específica de CENACE, considerar una condición operativa
      aproximada del 50% de la capacidad máxima disponible.
  - estilo: List Paragraph
    texto: Confirmar la disponibilidad del sistema de control de potencia activa y de la comunicación
      operativa requerida para la ejecución de la prueba.
  - estilo: List Paragraph
    texto: Registrar la condición inicial de operación, incluyendo potencia activa, consigna de potencia,
      frecuencia y voltaje del generador.
  - estilo: List Paragraph
    texto: Enviar una consigna de reducción de potencia activa al valor definido para la prueba, sin desconectar
      la Central Eléctrica de la red.
  - estilo: List Paragraph
    texto: Registrar la respuesta de la central desde la condición inicial de generación hasta alcanzar
      la consigna indicada.
  - estilo: List Paragraph
    texto: Medir el tiempo requerido para alcanzar la consigna y documentar la trayectoria de reducción
      de potencia.
  - estilo: List Paragraph
    texto: Verificar que la central permanezca interconectada, sin disparos, desconexiones no intencionales,
      pérdida de control o actuación indebida de protecciones.
  - estilo: Normal
    texto: Señales requeridas
  - estilo: Normal
    texto: Potencia activa (P)
  - estilo: Normal
    texto: Consigna de potencia
  - estilo: Normal
    texto: Frecuencia (f)
  - estilo: Normal
    texto: Voltaje del generador (Vg)
  - estilo: Normal
    texto: Para recabar la información de la prueba se utilizará un adquisidor de datos HIOKI MR8847A,
      mediante el cual se registrarán las señales eléctricas requeridas durante la ejecución de la prueba,
      con capacidad de muestreo mínima de 20 muestras por segundo, equivalente a un intervalo de 50 ms
      por señal.
  - estilo: Normal
    texto: Criterio de aceptación
  - estilo: Normal
    texto: La prueba se considera satisfactoria cuando la Central Eléctrica alcanza la consigna de potencia
      activa enviada, dentro del tiempo y tolerancia definidos por CENACE, manteniéndose interconectada
      y sin actuación indebida de protecciones.
  - estilo: Normal
    texto: En caso de que CENACE no establezca un tiempo o tolerancia específicos para esta prueba, la
      evaluación se documentará con base en la respuesta registrada, verificando que la reducción de potencia
      se realice de forma controlada, estable y sin desconexión de la central.
  - estilo: Normal
    texto: Resultados de la prueba
  - estilo: Normal
    texto: La evidencia de esta prueba corresponderá al registro de la potencia activa, consigna de potencia,
      frecuencia y voltaje del generador durante la reducción parcial de generación desde el punto operativo
      inicial hasta la consigna indicada.
  - estilo: Normal
    texto: La información presentada permitirá identificar el tiempo de respuesta de la Central Eléctrica,
      la trayectoria de reducción de potencia activa y la estabilidad de la operación durante la ejecución
      de la prueba.
  - estilo: Normal
    texto: Cuando CENACE no defina un criterio particular de tiempo y tolerancia, la evidencia se dejará
      documentada para su revisión, considerando el comportamiento de la central y la ausencia de desconexiones,
      disparos o condiciones anormales durante la prueba.
  - placeholder: 'Gráfica: Limitación Parcial de Potencia Activa

      [Espacio reservado para gráfica]'
  - estilo: Subtitle
    texto: Gráfica. Limitación Parcial de Potencia Activa
- seccion: '6'
  titulo: Prueba 6 - Control Primario de Frecuencia
  no_aplica_en_plantilla: false
  flujo:
  - tabla: aplicabilidad
  - placeholder: "Gráfica: Control Primario de Frecuencia — CNK Unidad \n[Espacio reservado para gráfica]"
  - estilo: Normal
    texto: Objetivo
  - estilo: Normal
    texto: Esta prueba verifica que la Central Eléctrica participe en el Control Primario de Frecuencia
      mediante la respuesta de potencia activa ante desviaciones de frecuencia, manteniéndose interconectada
      y en operación estable.
  - estilo: Normal
    texto: El criterio de evaluación considera una característica de regulación entre 3% y 8%. Para este
      protocolo, la validación se documentará mediante la prueba de Estatismo por unidad y las pruebas
      de respuesta ante alta y baja frecuencia, empleando señal simulada de frecuencia cuando no sea posible
      modificar la frecuencia real de la red.
  - estilo: Normal
    texto: Condiciones y desarrollo de la prueba
  - estilo: Normal
    texto: 1. Verificar que la Central Eléctrica se encuentre sincronizada, interconectada y en operación
      estable.
  - estilo: Normal
    texto: 2. Confirmar que el modo de control potencia-frecuencia se encuentre habilitado y que la característica
      de regulación aplicable esté configurada dentro del rango permitido.
  - estilo: Normal
    texto: 3. Registrar la condición inicial de operación, incluyendo potencia activa, frecuencia medida,
      frecuencia simulada, velocidad del rotor y voltaje del generador.
  - estilo: Normal
    texto: 4. Aplicar una señal simulada de frecuencia para generar desviaciones controladas por arriba
      y por debajo de 60 Hz, conforme al procedimiento de Estatismo y respuesta ante alta/baja frecuencia.
  - estilo: Normal
    texto: 5. Registrar la respuesta de potencia activa de la Central Eléctrica durante cada desviación
      de frecuencia simulada.
  - estilo: Normal
    texto: 6. Verificar que la respuesta sea estable, que corresponda al ajuste de estatismo y que no
      se presenten disparos, desconexiones no intencionales ni actuación indebida de protecciones.
  - estilo: Normal
    texto: Señales requeridas
  - estilo: Normal
    texto: Potencia activa (P)
  - estilo: Normal
    texto: Consigna de potencia
  - estilo: Normal
    texto: Frecuencia (f)
  - estilo: Normal
    texto: Voltaje del generador (Vg)
  - estilo: Normal
    texto: Criterio de aceptación
  - estilo: Normal
    texto: La prueba se considera satisfactoria cuando la Central Eléctrica demuestra respuesta de potencia
      activa ante desviaciones de frecuencia conforme a una característica de regulación entre 3% y 8%,
      manteniéndose interconectada y sin actuación indebida de protecciones.
  - estilo: Normal
    texto: Resultados de la prueba
  - estilo: Normal
    texto: La evidencia de esta prueba corresponderá al registro de frecuencia simulada, frecuencia medida,
      potencia activa, velocidad del rotor y voltaje del generador durante las pruebas de Estatismo y
      respuesta ante alta/baja frecuencia.
  - estilo: Normal
    texto: La evaluación deberá mostrar que la potencia activa cambia de manera coherente con la desviación
      de frecuencia y con el ajuste de estatismo configurado, sin comprometer la estabilidad operativa
      de la Central Eléctrica.
