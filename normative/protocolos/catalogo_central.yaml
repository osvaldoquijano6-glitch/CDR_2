pruebas:
- seccion: '1'
  titulo: Prueba 1 - Razón de cambio 2.5 Hz/s
  no_aplica_en_plantilla: false
  flujo:
  - tabla: aplicabilidad
  - estilo: Normal
    texto: Objetivo
  - estilo: Normal
    texto: Esta prueba verifica que la Central Eléctrica permanezca interconectada y en operación ante
      una razón de cambio de frecuencia respecto al tiempo de 2.5 Hz/s, sin disparos ni desconexiones
      no intencionales.
  - estilo: Normal
    texto: El criterio se toma del Anexo 5 del Procedimiento de Operación para la Declaración de Entrada
      en Operación Comercial de Centrales Eléctricas y Centros de Carga, en el apartado de pruebas por
      Central Eléctrica para Centrales Eléctricas Síncronas, donde se establece la prueba de Razón de
      cambio 2.5 Hz/s con el criterio de permanecer conectada.
  - estilo: Normal
    texto: La prueba también se fundamenta en el Código de Red 2.0, dentro del Manual Regulatorio de Requerimientos
      Técnicos para la Interconexión de Centrales Eléctricas al Sistema Eléctrico Nacional, Capítulo 2,
      particularmente en la Sección 2.2.1 Razón de cambio de la frecuencia, aplicable a Centrales Eléctricas
      tipo B.
  - estilo: Normal
    texto: Condiciones y desarrollo de la prueba
  - estilo: List Paragraph
    texto: Verificar que la Central Eléctrica se encuentre sincronizada, en operación estable y con tensión
      nominal.
  - estilo: List Paragraph
    texto: Operar la central aproximadamente al 75% de carga, conforme a las condiciones operativas disponibles
      para la prueba.
  - estilo: List Paragraph
    texto: Confirmar que el modo de control de potencia activa ante variaciones de frecuencia se encuentre
      habilitado.
  - estilo: List Paragraph
    texto: Registrar la condición inicial de operación, incluyendo frecuencia, frecuencia simulada, potencia
      activa, velocidad del rotor y voltaje del generador.
  - estilo: List Paragraph
    texto: Aplicar, mediante señal de frecuencia simulada, una variación controlada que permita evaluar
      una razón de cambio de 2.5 Hz/s.
  - estilo: List Paragraph
    texto: 'Para la evaluación, generar un cambio de frecuencia de 0.5 Hz en un tiempo menor o igual a
      200 ms, equivalente a:'
  - estilo: List Paragraph
    texto: RoCoF = Δf / Δt = 0.5 Hz / 0.200 s = 2.5 Hz/s
  - estilo: List Paragraph
    texto: Registrar la respuesta de la Central Eléctrica durante el evento de variación de frecuencia
      simulada.
  - estilo: List Paragraph
    texto: Verificar que la Central Eléctrica permanezca interconectada durante la aplicación de la razón
      de cambio.
  - estilo: List Paragraph
    texto: Confirmar que no se presenten disparos, desconexiones no intencionales, pérdida de control
      o actuación indebida de protecciones.
  - estilo: List Paragraph
    texto: Documentar que la prueba se realiza mediante frecuencia simulada, debido a que la frecuencia
      real de la red no puede modificarse intencionalmente para fines de prueba al formar parte del Sistema
      Interconectado Nacional.
  - estilo: Normal
    texto: Señales requeridas
  - estilo: Normal
    texto: Velocidad del rotor
  - estilo: Normal
    texto: Potencia activa (P)
  - estilo: Normal
    texto: Frecuencia (f)
  - estilo: Normal
    texto: Frecuencia simulada
  - estilo: Normal
    texto: Voltaje del generador (Vg)
  - estilo: Normal
    texto: Para recabar la información de la prueba se utilizará un adquisidor de datos HIOKI MR8847A,
      mediante el cual se registrarán las señales eléctricas requeridas durante la ejecución de la prueba,
      con capacidad de muestreo mínima de 20 muestras por segundo, equivalente a un intervalo de 50 ms
      por señal.
  - estilo: Normal
    texto: Criterio de aceptación
  - estilo: Normal
    texto: 'La prueba se considera satisfactoria cuando la Central Eléctrica permanece interconectada
      y en operación ante una razón de cambio de frecuencia de al menos:'
  - estilo: Normal
    texto: 2.5 Hz/s, evaluada como Δf / Δt = 0.5 Hz / 0.200 s.
  - estilo: Normal
    texto: evaluada mediante una variación de frecuencia simulada, sin disparo de protecciones ni desconexión
      no intencional.
  - estilo: Normal
    texto: Resultados de la prueba
  - estilo: Normal
    texto: La evidencia de esta prueba corresponderá al registro de la frecuencia simulada, frecuencia
      medida, potencia activa, velocidad del rotor y voltaje del generador durante la aplicación del cambio
      de frecuencia.
  - estilo: Normal
    texto: La información presentada permitirá verificar que la Central Eléctrica permanece interconectada
      ante la razón de cambio evaluada y que la variación de potencia activa corresponde a la actuación
      del modo de control de frecuencia, sin comprometer la continuidad operativa de la central.
  - estilo: Normal
    texto: Como respaldo documental, se podrá integrar la evidencia de configuración del sistema de control
      donde se identifique el ajuste asociado a la permanencia ante razón de cambio de frecuencia, siempre
      que dicha información se encuentre disponible.
  - placeholder: 'Captura ajuste Freq. control setpoint ramp = 2.5 Hz/s

      [Captura de pantalla]'
  - estilo: Subtitle
    texto: Figura. Ajustes control setpoint 2-5Hz/s
  - placeholder: 'Gráfica: Razón de cambio 2.5 Hz/s — CNK

      [Espacio reservado para gráfica]'
  - estilo: Subtitle
    texto: Grafica. Razón de Cambio 2.5 Hz/s
- seccion: '2'
  titulo: Prueba 2 - Rango de Frecuencia
  no_aplica_en_plantilla: false
  flujo:
  - tabla: aplicabilidad
  - estilo: Normal
    texto: Objetivo
  - estilo: Normal
    texto: Esta prueba verifica que la Central Eléctrica permanezca interconectada y en operación dentro
      de los rangos de frecuencia y tiempos mínimos establecidos para el Sistema Interconectado Nacional.
  - estilo: Normal
    texto: El criterio de evaluación se toma del Anexo 5 del Procedimiento de Operación para la Declaración
      de Entrada en Operación Comercial de Centrales Eléctricas y Centros de Carga, en el apartado de
      pruebas por Central Eléctrica para Centrales Eléctricas Síncronas, donde se establece la prueba
      de Rango de Frecuencia.
  - estilo: Normal
    texto: El fundamento técnico corresponde al Código de Red 2.0, dentro del Manual Regulatorio de Requerimientos
      Técnicos para la Interconexión de Centrales Eléctricas al Sistema Eléctrico Nacional, Capítulo 2,
      Sección 2.1, donde se definen las zonas de frecuencia y los tiempos mínimos de operación sin desconexión
      de la Red Eléctrica para Centrales Eléctricas.
  - tabla_datos:
    - - Área síncrona
      - Rango de frecuencias
      - Tiempo mínimo de operación
    - - Sistema Interconectado Nacional y Baja California
      - 61.8 Hz ≤ f < 62.4 Hz
      - 15 minutos
    - - Sistema Interconectado Nacional y Baja California
      - 61.2 Hz ≤ f < 61.8 Hz
      - 30 minutos
    - - Sistema Interconectado Nacional y Baja California
      - 58.8 Hz ≤ f < 61.2 Hz
      - Ilimitado
    - - Sistema Interconectado Nacional y Baja California
      - 58.2 Hz ≤ f < 58.8 Hz
      - 30 minutos
    - - Sistema Interconectado Nacional y Baja California
      - 57.0 Hz ≤ f < 58.2 Hz
      - 15 minutos
  - estilo: Subtitle
    texto: Tabla 1.2 Tiempos mínimos en los que una Central Eléctrica debe operar en frecuencias diferentes
      del valor nominal, sin desconectarse de la red.
  - estilo: Normal
    texto: Condiciones y desarrollo de la prueba
  - estilo: List Paragraph
    texto: Integrar la información técnica del fabricante donde se indiquen los rangos de frecuencia en
      los que las unidades de la Central Eléctrica pueden operar de manera correcta y segura.
  - estilo: List Paragraph
    texto: Revisar las restricciones operativas asociadas a la velocidad o frecuencia de operación de
      la unidad.
  - estilo: List Paragraph
    texto: Verificar que los rangos de operación documentados no se contrapongan con los tiempos mínimos
      de permanencia requeridos por el Código de Red.
  - estilo: List Paragraph
    texto: Integrar, en caso de estar disponible, evidencia de pruebas de diseño, pruebas de laboratorio
      o documentación técnica que respalde la capacidad de operación de la unidad ante frecuencias distintas
      a la nominal.
  - estilo: List Paragraph
    texto: Revisar los ajustes de protección asociados a frecuencia, principalmente funciones de sobrefrecuencia
      y baja frecuencia.
  - estilo: List Paragraph
    texto: Integrar evidencia gráfica de los ajustes implementados en campo y, cuando aplique, el estudio
      documental de ajuste de protecciones de la unidad.
  - estilo: List Paragraph
    texto: Comparar los ajustes de protección contra los rangos mínimos de permanencia requeridos, verificando
      que no provoquen la desconexión anticipada de la Central Eléctrica dentro de los rangos exigidos.
  - estilo: Normal
    texto: Señales requeridas
  - estilo: Normal
    texto: No aplica para medición directa en campo, al tratarse de una verificación documental de rangos
      de operación y ajustes de protección.
  - estilo: Normal
    texto: Criterio de aceptación
  - estilo: Normal
    texto: La prueba se considera satisfactoria cuando la documentación técnica y los ajustes de protección
      evidencian que la Central Eléctrica puede permanecer interconectada y operando dentro de los rangos
      de frecuencia y tiempos mínimos establecidos.
  - estilo: Normal
    texto: De forma particular, los ajustes de protección no deberán provocar la desconexión de la Central
      Eléctrica antes de cumplir los tiempos mínimos requeridos para cada rango de frecuencia.
  - estilo: Normal
    texto: Resultados de la prueba
  - estilo: Normal
    texto: La evidencia de esta prueba corresponderá a la documentación técnica de la unidad, los rangos
      de operación permitidos y los ajustes de protección asociados a frecuencia.
  - estilo: Normal
    texto: La información presentada permitirá comparar los puntos de alarma y disparo de las protecciones
      de frecuencia contra los tiempos mínimos de operación requeridos por el Código de Red, verificando
      que la Central Eléctrica no se desconecte dentro de los rangos exigidos.
  - estilo: Normal
    texto: La evidencia documental podrá presentarse mediante tabla de ajustes de protección, capturas
      del sistema de control o protección, y referencias al documento técnico donde se identifiquen los
      parámetros de sobrefrecuencia y baja frecuencia.
  - tabla_datos:
    - - Protección ANSI
      - Frecuencia (Hz)
      - Tiempo (s)
      - Modo de operación
    - - ''
      - ''
      - ''
      - Alarma
    - - ''
      - ''
      - ''
      - Disparo
  - estilo: Subtitle
    texto: Tabla. Ajustes de protección de sobre frecuencia y baja frecuencia
  - placeholder: 'Ajustes — Sobre/Baja frecuencia

      [Captura de pantalla]'
  - estilo: Subtitle
    texto: Figura. Ajustes Sobre/Baja frecuencia
- seccion: '3'
  titulo: Prueba 3 - Limitación Total de Potencia Activa
  no_aplica_en_plantilla: false
  flujo:
  - tabla: aplicabilidad
  - estilo: Normal
    texto: Objetivo
  - estilo: p1
    texto: Esta prueba verifica que la Central Eléctrica permita detener la aportación de potencia activa
      mediante una consigna de reducción total, llevando la referencia de generación hasta 0 MW, sin que
      esto implique la desconexión de la central de la red.
  - estilo: p1
    texto: El criterio de evaluación se toma del Anexo 5 del Procedimiento de Operación para la Declaración
      de Entrada en Operación Comercial de Centrales Eléctricas y Centros de Carga, en el apartado de
      pruebas por Central Eléctrica para Centrales Eléctricas Síncronas, donde se establece la prueba
      de Limitación Total de Potencia Activa, con el criterio de alcanzar la consigna en un tiempo mayor
      a 5 segundos.
  - estilo: p1
    texto: La prueba permite comprobar la capacidad de la central para responder a una instrucción de
      reducción total de potencia activa, manteniendo la condición de interconexión y sin presentar pérdida
      de control durante la reducción.
  - estilo: Normal
    texto: Condiciones y desarrollo de la prueba
  - estilo: List Paragraph
    texto: Verificar que la Central Eléctrica se encuentre sincronizada y operando en condición estable.
  - estilo: List Paragraph
    texto: Operar la central a su capacidad disponible para la prueba, preferentemente cercana a su condición
      nominal.
  - estilo: List Paragraph
    texto: Confirmar la disponibilidad del sistema de control de potencia activa y de la comunicación
      operativa requerida para la ejecución de la prueba.
  - estilo: List Paragraph
    texto: Registrar la condición inicial de operación, incluyendo potencia activa, consigna de potencia,
      frecuencia y voltaje del generador.
  - estilo: List Paragraph
    texto: Enviar la consigna de reducción total de potencia activa, estableciendo una referencia de 0
      MW.
  - estilo: List Paragraph
    texto: Registrar la respuesta de la Central Eléctrica desde la condición inicial de generación hasta
      alcanzar la consigna de 0 MW.
  - estilo: List Paragraph
    texto: Verificar que durante la reducción de potencia la central permanezca interconectada a la red.
  - estilo: List Paragraph
    texto: Confirmar que no se presenten disparos, desconexiones no intencionales, pérdida de control
      o actuación indebida de protecciones.
  - estilo: List Paragraph
    texto: Registrar el tiempo total requerido para alcanzar la consigna de potencia activa indicada.
  - estilo: Normal
    texto: Señales requeridas
  - estilo: Normal
    texto: Potencia activa (P)
  - estilo: Normal
    texto: Consigna de potencia
  - estilo: Normal
    texto: Frecuencia (f)
  - estilo: Normal
    texto: Voltaje del generador (Vg)
  - estilo: Normal
    texto: Para recabar la información de la prueba se utilizará un adquisidor de datos HIOKI MR8847A,
      mediante el cual se registrarán las señales eléctricas requeridas durante la ejecución de la prueba,
      con capacidad de muestreo mínima de 20 muestras por segundo, equivalente a un intervalo de 50 ms
      por señal.
  - estilo: Normal
    texto: Criterio de aceptación
  - estilo: Normal
    texto: 'La prueba se considera satisfactoria cuando la Central Eléctrica alcanza la consigna de reducción
      total de potencia activa:'
  - estilo: Normal
    texto: 'en un tiempo mayor a:'
  - estilo: Normal
    texto: manteniéndose interconectada y sin actuación indebida de protecciones.
  - estilo: Normal
    texto: Resultados de la prueba
  - estilo: Normal
    texto: La evidencia de esta prueba corresponderá al registro de la potencia activa, consigna de potencia,
      frecuencia y voltaje del generador durante la reducción total de generación.
  - estilo: Normal
    texto: La información presentada permitirá identificar el tiempo requerido para que la Central Eléctrica
      alcance la consigna de 0 MW, así como verificar que la central permanece interconectada durante
      la ejecución de la prueba.
  - estilo: Normal
    texto: La evaluación se sustentará mediante el comportamiento gráfico de la potencia activa respecto
      a la consigna aplicada, confirmando la reducción controlada de generación sin desconexión no intencional.
  - placeholder: 'Gráfica: Limitación Total de Potencia Activa — CNK

      [Espacio reservado para gráfica]'
  - estilo: Subtitle
    texto: Grafica. Limitación Total de Potencia Activa
- seccion: '4'
  titulo: Prueba 4 - Reconexión Automática
  no_aplica_en_plantilla: false
  flujo:
  - tabla: aplicabilidad
  - estilo: Normal
    texto: Objetivo
  - estilo: Normal
    texto: Esta prueba verifica que la Central Eléctrica cumpla con las condiciones requeridas para su
      reconexión automática o resincronización posterior a una desconexión, considerando los rangos permitidos
      de frecuencia, tensión y rampa de toma de carga.
  - estilo: Normal
    texto: El criterio de evaluación se toma del Anexo 5 del Procedimiento de Operación para la Declaración
      de Entrada en Operación Comercial de Centrales Eléctricas y Centros de Carga, en el apartado de
      pruebas por Central Eléctrica para Centrales Eléctricas Síncronas, donde se establece la prueba
      de Reconexión Automática.
  - estilo: Normal
    texto: El fundamento técnico se asocia con los requerimientos de reconexión definidos en el Código
      de Red 2.0, dentro del Manual Regulatorio de Requerimientos Técnicos para la Interconexión de Centrales
      Eléctricas al Sistema Eléctrico Nacional, particularmente en el Capítulo 2, Sección 2.2.8, Condiciones
      para reconexión automática, aplicable a Centrales Eléctricas tipo B.
  - estilo: Normal
    texto: Condiciones y desarrollo de la prueba
  - estilo: List Paragraph
    texto: Verificar que la Central Eléctrica se encuentre desconectada de la red y operando en condición
      de isla, conforme al procedimiento operativo definido para la prueba.
  - estilo: List Paragraph
    texto: Mantener la condición previa a la reconexión durante al menos 5 minutos, verificando que la
      frecuencia y la tensión permanezcan dentro de los rangos requeridos.
  - estilo: List Paragraph
    texto: Registrar las condiciones previas a la reconexión, incluyendo frecuencia, voltaje del generador
      y potencia activa.
  - estilo: List Paragraph
    texto: Coordinar la maniobra de reconexión o resincronización conforme al procedimiento operativo
      y comunicación aplicable.
  - estilo: List Paragraph
    texto: Ejecutar la reconexión de la Central Eléctrica a la red.
  - estilo: List Paragraph
    texto: Registrar el comportamiento de la frecuencia, tensión y potencia activa durante la reconexión.
  - estilo: List Paragraph
    texto: Monitorear la rampa de toma de carga posterior a la reconexión.
  - estilo: List Paragraph
    texto: Verificar que el incremento de potencia activa no supere la rampa máxima admisible.
  - estilo: List Paragraph
    texto: Confirmar que la Central Eléctrica se mantenga estable posterior a la reconexión, sin oscilaciones
      anormales, pérdida de sincronismo o actuación indebida de protecciones.
  - estilo: Normal
    texto: Señales requeridas
  - estilo: Normal
    texto: Potencia activa de la central
  - estilo: Normal
    texto: Frecuencia (f)
  - estilo: Normal
    texto: Voltaje del generador (Vg)
  - estilo: Normal
    texto: Para recabar la información de la prueba se utilizará un adquisidor de datos HIOKI MR8847A,
      mediante el cual se registrarán las señales eléctricas requeridas durante la ejecución de la prueba,
      con capacidad de muestreo mínima de 20 muestras por segundo, equivalente a un intervalo de 50 ms
      por señal.
  - estilo: Normal
    texto: Criterio de aceptación
  - estilo: Normal
    texto: La prueba se considera satisfactoria cuando la Central Eléctrica cumple con las condiciones
      previas de reconexión y con la rampa máxima de toma de carga establecida.
  - estilo: Normal
    texto: 'Previo a la reconexión, durante al menos 5 minutos, deberán cumplirse las siguientes condiciones:'
  - estilo: Normal
    texto: 'Posterior a la reconexión, la rampa máxima admisible de incremento de potencia activa será:'
  - estilo: Normal
    texto: Resultados de la prueba
  - estilo: Normal
    texto: La evidencia de esta prueba corresponderá al registro de las condiciones previas a la reconexión,
      considerando frecuencia y tensión durante el periodo mínimo requerido, así como al comportamiento
      de la potencia activa durante la toma de carga posterior a la resincronización.
  - estilo: Normal
    texto: La información presentada permitirá verificar que la Central Eléctrica mantiene las condiciones
      necesarias para la reconexión y que la rampa de incremento de potencia activa se mantiene dentro
      del límite permitido.
  - estilo: Normal
    texto: La evaluación podrá integrarse mediante tablas de valores máximos y mínimos previos a la reconexión,
      así como el cálculo de la rampa de toma de carga en terminales del generador y, cuando aplique,
      en el Punto de Interconexión.
