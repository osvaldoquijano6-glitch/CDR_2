origen: Protocolo_Central_v1.2.1.docx
capitulo: 3. Pruebas por Central Eléctrica
preambulo:
- estilo: Normal
  texto: A continuación, se lista la aplicabilidad de las pruebas, el objetivo, las condiciones de la
    prueba, el procedimiento, las señales e instrumentación requerida, el criterio de aceptación y los
    resultados de cada una de las pruebas por central. De conformidad con el Procedimiento de Operación
    para la Declaración de Entrada en Operación Comercial de Centrales Eléctricas y Centros de Carga (Anexo
    5), las pruebas se encuentran clasificadas según el tipo de Central Eléctrica (A, B, C y D).
- estilo: Normal
  texto: En ese sentido, y considerando que la Central Eléctrica CONEK CATERPILLAR corresponde a una Central
    Eléctrica Tipo B, únicamente se contemplan, desarrollan y documentan en el presente protocolo aquellas
    pruebas que el Anexo 5 establece como aplicables a Centrales Eléctricas Tipo B.
- estilo: Subtitle
  texto: Tabla 1. Listado de pruebas aplicables a Centrales Asincronas tipo B
- estilo: Normal
  texto: Las pruebas señaladas en el Anexo 5 como exclusivas para Centrales Tipo C o D no forman parte
    del alcance de este protocolo y, por lo tanto, se documentan como No Aplicables, sin que ello represente
    incumplimiento normativo alguno, dado que su exigibilidad depende expresamente del tipo de central
    definido por la regulación vigente. De manera electrónica se entregarán los datos registrados para
    cada una de las pruebas que apliquen, además de los archivos PDF con la información correspondiente
    a distintas pruebas, con diagramas, ajustes de protecciones, relés, etc.
