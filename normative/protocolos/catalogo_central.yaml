    texto: 'Gráfica: Desempeño del control de tensión'
- seccion: '14'
  titulo: Prueba 14 - Control de Tensión en Condiciones Dinámicas o de Falla
  no_aplica_en_plantilla: false
  flujo:
  - tabla: aplicabilidad
  - estilo: Normal
    texto: Objetivo
  - estilo: Normal
    texto: Esta prueba verifica que la Central Eléctrica cuente con ajustes de protección compatibles
      con los requerimientos de permanencia ante condiciones dinámicas o de falla, de forma que no se
      produzca una desconexión anticipada mientras la tensión permanezca dentro de la zona permitida.
  - estilo: Normal
    texto: El criterio de evaluación se toma del Anexo 5 del Procedimiento de Operación para la Declaración
      de Entrada en Operación Comercial de Centrales Eléctricas y Centros de Carga, en el apartado de
      pruebas por Central Eléctrica para Centrales Eléctricas Síncronas, donde se establece la prueba
      de Control de Tensión en Condiciones Dinámicas o de Falla.
  - estilo: Normal
    texto: El fundamento técnico corresponde al Código de Red 2.0, dentro del Manual Regulatorio de Requerimientos
      Técnicos para la Interconexión de Centrales Eléctricas al Sistema Eléctrico Nacional, Capítulo 4,
      relativo a los requerimientos de control de tensión en condiciones dinámicas o de falla, particularmente
      para Centrales Eléctricas tipo B y C.
  - estilo: Normal
    texto: Condiciones y desarrollo de la prueba
  - estilo: List Paragraph
    texto: Integrar la información documental de los ajustes de protección asociados a tensión en la Central
      Eléctrica y en el Punto de Interconexión.
  - estilo: List Paragraph
    texto: Identificar los ajustes de protección de baja tensión y sobretensión aplicables, principalmente
      funciones ANSI 27 y ANSI 59.
  - estilo: List Paragraph
    texto: Comparar los ajustes de alarma y disparo contra la curva de permanencia requerida para condiciones
      dinámicas o de falla.
  - estilo: List Paragraph
    texto: Verificar que los ajustes permitan la permanencia de la Central Eléctrica dentro de la Zona
      A definida para Centrales Eléctricas Síncronas tipo B y C.
  - estilo: List Paragraph
    texto: Documentar los puntos de operación tensión-tiempo aplicables al perfil de permanencia ante
      falla.
  - estilo: List Paragraph
    texto: Integrar evidencia documental de los ajustes de protección del controlador, relevador o sistema
      de protección correspondiente.
  - estilo: List Paragraph
    texto: Cuando aplique, indicar la equivalencia de los ajustes en valores por unidad para comprobar
      su correspondencia con los límites requeridos.
  - estilo: Normal
    texto: Señales requeridas
  - estilo: Normal
    texto: No aplica para medición directa en campo, al tratarse de una verificación documental de ajustes
      de protección y permanencia ante condiciones dinámicas o de falla.
  - estilo: Normal
    texto: Criterio de aceptación
  - estilo: Normal
    texto: La prueba se considera satisfactoria cuando los ajustes de protección permiten que la Central
      Eléctrica permanezca interconectada dentro de la Zona A del perfil tensión-tiempo aplicable a Centrales
      Eléctricas Síncronas tipo B y C.
  - estilo: Normal
    texto: La evaluación deberá confirmar que las protecciones de baja tensión y sobretensión no provoquen
      una desconexión anticipada dentro de la zona permitida por el Código de Red.
  - estilo: Normal
    texto: Resultados de la prueba
  - estilo: Normal
    texto: La evidencia de esta prueba corresponderá a la revisión documental de los ajustes de protección
      de tensión implementados en la Central Eléctrica y en el Punto de Interconexión.
  - estilo: Normal
    texto: La información presentada permitirá comparar los ajustes de alarma y disparo contra el perfil
      de permanencia tensión-tiempo requerido, verificando que los valores configurados sean compatibles
      con la operación dentro de la Zona A.
  - estilo: Normal
    texto: Cuando se integren los ajustes del relevador asociado al Punto de Interconexión, se deberá
      indicar su equivalencia en por unidad para confirmar su correspondencia con los límites de permanencia
      ante falla. En particular, deberá verificarse que el ajuste de disparo por sobretensión no interfiera
      con la permanencia requerida hasta 1.10 pu, y que los ajustes de baja tensión sean compatibles con
      la curva de respuesta aplicable.
  - placeholder: 'Figura. Respuesta de la central eléctrica de tipo B ante condiciones dinámicas o de
      falla (perfil V vs t)

      [Espacio reservado para gráfica]'
