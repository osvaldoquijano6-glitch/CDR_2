    texto: Objetivo
  - estilo: Normal
    texto: Esta prueba verifica que la Central Eléctrica Síncrona tipo B cuente con un sistema de control
      automático de excitación permanente, capaz de mantener una tensión constante en sus terminales mediante
      una consigna seleccionable, sin causar inestabilidad dentro de su rango de operación.
  - estilo: Normal
    texto: El criterio de evaluación se toma del Anexo 5 del Procedimiento de Operación para la Declaración
      de Entrada en Operación Comercial de Centrales Eléctricas y Centros de Carga, en el apartado de
      pruebas por Central Eléctrica para Centrales Eléctricas Síncronas, donde se establece la prueba
      de Sistema de Control de Tensión.
  - estilo: Normal
    texto: El fundamento técnico corresponde al Código de Red 2.0, dentro del Manual Regulatorio de Requerimientos
      Técnicos para la Interconexión de Centrales Eléctricas al Sistema Eléctrico Nacional, Capítulo 3,
      Sección 3.2.2, relativo al sistema de control de tensión para Centrales Eléctricas Síncronas tipo
      B.
  - estilo: Normal
    texto: Condiciones y desarrollo de la prueba
  - estilo: List Paragraph
    texto: Integrar la evidencia documental del sistema de control automático de excitación de la Central
      Eléctrica.
  - estilo: List Paragraph
    texto: Verificar que el sistema permita operar con una consigna seleccionable de tensión.
  - estilo: List Paragraph
    texto: Confirmar que el sistema de excitación pueda mantener tensión constante en terminales de la
      Central Eléctrica dentro de su rango de operación.
  - estilo: List Paragraph
    texto: 'Relacionar esta verificación con las pruebas por unidad asociadas al sistema de control de
      tensión, principalmente:'
  - estilo: List Paragraph
    texto: Rango Operativo de Tensión.
  - estilo: List Paragraph
    texto: Escalón de Tensión.
  - estilo: List Paragraph
    texto: Limitador V/Hz.
  - estilo: List Paragraph
    texto: Secuencia de Excitación y Desexcitación.
  - estilo: List Paragraph
    texto: Seguidor Auto entre Canales y UCE’s.
  - estilo: List Paragraph
    texto: Compensador de Reactivos.
  - estilo: List Paragraph
    texto: Documentar la referencia al Reporte de Pruebas por Unidad de la Central Eléctrica CNK, donde
      se desarrollan las pruebas específicas del sistema de excitación y control de tensión.
  - estilo: Normal
    texto: Señales requeridas
  - estilo: Normal
    texto: No aplica para medición directa en campo, al tratarse de una verificación documental sustentada
      en las pruebas por unidad asociadas al sistema de control de tensión.
  - estilo: Normal
    texto: Criterio de aceptación
  - estilo: Normal
    texto: La prueba se considera satisfactoria cuando se documenta que la Central Eléctrica cuenta con
      un sistema de control automático de excitación permanente, capaz de proporcionar una tensión constante
      en terminales mediante una consigna seleccionable, sin causar inestabilidad en su rango de operación.
  - estilo: Normal
    texto: Resultados de la prueba
  - estilo: Normal
    texto: La evidencia de esta prueba corresponderá a la documentación técnica del sistema de excitación
      y a los resultados de las pruebas por unidad relacionadas con el control de tensión.
  - estilo: Normal
    texto: La información presentada permitirá confirmar que la Central Eléctrica cuenta con un sistema
      automático de excitación y que su desempeño fue verificado mediante las pruebas específicas de la
      Unidad de Generación.
  - estilo: Normal
    texto: Para el sustento de esta prueba se deberá hacer referencia al Reporte de Pruebas por Unidad
      de la Central Eléctrica CNK, particularmente a las pruebas asociadas al sistema de control de tensión.
  - placeholder: 'Gráfica: Rango Operativo de Tensión

      [Espacio reservado para gráfica]'
