- seccion: '9'
  titulo: Prueba 9 - Rango de Tensión en el Punto de Interconexión
  no_aplica_en_plantilla: false
  flujo:
  - tabla: aplicabilidad
  - estilo: Normal
    texto: Objetivo
  - estilo: p1
    texto: Esta prueba verifica que la Central Eléctrica pueda permanecer interconectada y en operación
      dentro de los rangos de tensión establecidos en el Punto de Interconexión, sin que los ajustes de
      protección provoquen una desconexión anticipada dentro de los tiempos mínimos requeridos.
  - estilo: p1
    texto: El criterio de evaluación se toma del Anexo 5 del Procedimiento de Operación para la Declaración
      de Entrada en Operación Comercial de Centrales Eléctricas y Centros de Carga, en el apartado de
      pruebas por Central Eléctrica para Centrales Eléctricas Síncronas, donde se establece la prueba
      de Rango de Tensión en el Punto de Interconexión.
  - estilo: p1
    texto: El fundamento técnico corresponde al Código de Red 2.0, dentro del Manual Regulatorio de Requerimientos
      Técnicos para la Interconexión de Centrales Eléctricas al Sistema Eléctrico Nacional, Capítulo 3,
      Sección 3.1.1, donde se establecen los valores de operación sin desconexión ante variaciones de
      tensión para Centrales Eléctricas.
  - estilo: Normal
    texto: solo hay una unidad, mostrado el cumplimiento de los tiempos establecidos a continuación.
  - tabla_datos:
    - - Área síncrona
      - Rango de tensión del punto de interconexión
      - Tiempo mínimo de operación
    - - Sistema Interconectado Nacional
      - 1.05 p.u. < V < 1.10 p.u.
      - 30 minutos
    - - Sistema Interconectado Nacional
      - 0.95 p.u. ≤ V ≤ 1.05 p.u.
      - Ilimitado
    - - Sistema Interconectado Nacional
      - 0.90 p.u. < V < 0.95 p.u.
      - 30 minutos
  - estilo: Subtitle
    texto: Tabla 1. Tiempo mínimo de operación sin desconexión.
  - estilo: Normal
    texto: Condiciones y desarrollo de la prueba
  - estilo: List Paragraph
    texto: Integrar la información documental de los ajustes de protección asociados al Punto de Interconexión.
  - estilo: List Paragraph
    texto: Identificar los ajustes de protección de baja tensión y sobretensión aplicables, principalmente
      funciones ANSI 27 y ANSI 59.
  - estilo: List Paragraph
    texto: Verificar los valores de alarma y disparo configurados en el relevador correspondiente al Punto
      de Interconexión.
  - estilo: List Paragraph
    texto: Comparar los ajustes de protección contra los rangos de tensión establecidos en el criterio
      de aceptación.
  - estilo: List Paragraph
    texto: Confirmar que los ajustes no provoquen la desconexión de la Central Eléctrica dentro de los
      rangos donde el Código de Red exige permanencia en operación.
  - estilo: List Paragraph
    texto: Documentar los valores de ajuste en volts y su equivalencia en por unidad, cuando dicha conversión
      aplique.
  - estilo: List Paragraph
    texto: Integrar capturas de pantalla o evidencia documental de los ajustes del relevador como soporte
      de la evaluación.
  - estilo: Normal
    texto: Señales requerida
  - estilo: Normal
    texto: No aplica para medición directa en campo, al tratarse de una verificación documental de ajustes
      de protección y rangos de permanencia ante variaciones de tensión.
  - estilo: Normal
    texto: Criterio de aceptación
  - estilo: Normal
    texto: La prueba se considera satisfactoria cuando la documentación presentada demuestra que los ajustes
      de protección permiten la permanencia de la Central Eléctrica dentro de los rangos de tensión establecidos.
  - estilo: Normal
    texto: Resultados de la prueba
  - estilo: Normal
    texto: La evidencia de esta prueba corresponderá a la revisión documental de los ajustes de protección
      del relevador asociado al Punto de Interconexión, considerando las funciones de baja tensión y sobretensión.
  - estilo: Normal
    texto: La información presentada permitirá comparar los valores de alarma y disparo contra los rangos
      de permanencia exigidos, verificando que la Central Eléctrica pueda mantenerse en operación dentro
      de los límites establecidos por el Código de Red.
  - tabla_datos:
    - - Protección ANSI
      - Voltaje (V)
      - Tiempo (s)
      - Modo de operación
    - - ''
      - ''
      - ''
      - ''
    - - ''
