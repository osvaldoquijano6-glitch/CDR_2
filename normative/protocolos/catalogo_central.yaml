- seccion: '18'
  titulo: Prueba 18 - Requerimientos Generales de Administración del Sistema
  no_aplica_en_plantilla: false
  flujo:
  - tabla: aplicabilidad
  - estilo: Normal
    texto: Objetivo
  - estilo: Normal
    texto: Esta prueba verifica que la Central Eléctrica cuente con la evidencia documental asociada a
      los requerimientos generales de administración del sistema, incluyendo esquemas de control, esquemas
      de protección, prioridad entre protección y control, intercambio de información, instrumentación
      y modelos de simulación.
  - estilo: Normal
    texto: El criterio de evaluación se toma del Anexo 5 del Procedimiento de Operación para la Declaración
      de Entrada en Operación Comercial de Centrales Eléctricas y Centros de Carga, en el apartado de
      pruebas por Central Eléctrica para Centrales Eléctricas Síncronas, donde se establecen los Requerimientos
      Generales de Administración del Sistema.
  - estilo: Normal
    texto: El fundamento técnico corresponde al Código de Red 2.0, dentro del Manual Regulatorio de Requerimientos
      Técnicos para la Interconexión de Centrales Eléctricas al Sistema Eléctrico Nacional, Capítulo 6,
      relativo a los requerimientos generales de administración del SEN para Centrales Eléctricas tipo
      B.
  - estilo: Normal
    texto: Condiciones y desarrollo de la prueba
  - estilo: List Paragraph
    texto: Integrar la evidencia documental de los esquemas de control y ajustes disponibles para la Central
      Eléctrica.
  - estilo: List Paragraph
    texto: Verificar la documentación de esquemas de acción remedial, en caso de que resulten aplicables
      al proyecto.
  - estilo: List Paragraph
    texto: Integrar los esquemas de protección y ajustes asociados a la Central Eléctrica, Unidad de Generación,
      transformador, servicios auxiliares y Punto de Interconexión.
  - estilo: List Paragraph
    texto: Revisar la documentación de prioridad entre esquemas de protección y funciones de control.
  - estilo: List Paragraph
    texto: Integrar la evidencia del intercambio de información en tiempo real o bajo demanda con CENACE,
      conforme a los requerimientos aplicables durante la validación técnica.
  - estilo: List Paragraph
    texto: Confirmar que la Central Eléctrica cuente con instrumentación para el registro de variables
      eléctricas principales.
  - estilo: List Paragraph
    texto: Integrar la referencia a los modelos de simulación de la Central Eléctrica, considerando que
      su verificación específica se desarrolla en la prueba correspondiente a modelos.
  - estilo: Normal
    texto: Señales requeridas
  - estilo: Normal
    texto: No aplica para medición directa en campo, al tratarse de una verificación documental de los
      requerimientos generales de administración del sistema.
  - estilo: Normal
    texto: Criterio de aceptación
  - estilo: Normal
    texto: 'La prueba se considera satisfactoria cuando se presenta evidencia documental suficiente de
      los siguientes requerimientos:'
  - estilo: Heading 3
    texto: Esquemas de control y ajustes
  - estilo: List Paragraph
    texto: Esquemas de acción remedial, cuando apliquen.
  - estilo: Heading 3
    texto: Esquemas de protección y ajustes
  - estilo: List Paragraph
    texto: Corto circuito externo e interno.
  - estilo: List Paragraph
    texto: Carga asimétrica o secuencia de fase negativa.
  - estilo: List Paragraph
    texto: Sobrecarga del estator o del rotor.
  - estilo: List Paragraph
    texto: Sobreexcitación o baja excitación.
  - estilo: List Paragraph
    texto: Sobretensión o baja tensión en terminales de la Central Eléctrica.
  - estilo: List Paragraph
    texto: Sobretensión o baja tensión en el Punto de Interconexión.
  - estilo: List Paragraph
    texto: Sobretensión o baja tensión en servicios auxiliares.
  - estilo: List Paragraph
    texto: Oscilaciones de potencia entre áreas.
  - estilo: List Paragraph
    texto: Corriente de energización o inrush.
  - estilo: List Paragraph
    texto: Operación asíncrona.
  - estilo: List Paragraph
    texto: Esfuerzos torsionales inadmisibles o resonancia subsíncrona.
  - estilo: List Paragraph
    texto: Protección de la línea de interconexión entre la Central Eléctrica y la Red Eléctrica.
  - estilo: List Paragraph
    texto: Protección del transformador de Unidad de Central Eléctrica.
  - estilo: List Paragraph
    texto: Protecciones de respaldo y ante falla de equipo de seccionamiento.
  - estilo: List Paragraph
    texto: Sobreflujo magnético, V/Hz.
  - estilo: List Paragraph
    texto: Potencia inversa.
  - estilo: List Paragraph
    texto: Razón de cambio de la frecuencia.
  - estilo: List Paragraph
    texto: Desplazamiento de tensión del neutro.
  - estilo: List Paragraph
    texto: Verificación de sincronismo.
  - estilo: List Paragraph
    texto: Pérdida de campo.
  - estilo: Heading 3
    texto: Prioridad de protección y control
  - estilo: List Paragraph
    texto: Protecciones del sistema y protecciones de la Central Eléctrica.
  - estilo: List Paragraph
    texto: Control de frecuencia mediante ajuste de potencia activa.
  - estilo: List Paragraph
    texto: Restricción de potencia activa.
  - estilo: List Paragraph
    texto: Limitación de rampa de potencia activa.
  - estilo: Heading 3
    texto: Intercambio de información
  - estilo: Normal
    texto: La Central Eléctrica deberá contar con los medios para intercambiar información en tiempo real
      o bajo demanda con CENACE, con estampa de tiempo conforme a lo definido durante la validación de
      requerimientos técnicos.
  - estilo: Heading 3
    texto: Instrumentación para Centrales Eléctricas
  - estilo: Normal
    texto: 'La Central Eléctrica deberá contar con instrumentación para registrar, al menos:'
  - estilo: List Paragraph
    texto: Tensión.
  - estilo: List Paragraph
    texto: Potencia activa.
  - estilo: List Paragraph
    texto: Potencia reactiva.
  - estilo: List Paragraph
    texto: Frecuencia.
  - estilo: Heading 3
    texto: Modelos de simulación
  - estilo: Normal
    texto: La Central Eléctrica deberá contar con modelos de simulación que representen adecuadamente
      su comportamiento. La validación específica de dichos modelos se documenta en la prueba correspondiente
      a Modelos de Simulación.
  - estilo: Normal
    texto: Resultados de la prueba
  - estilo: Normal
    texto: La evidencia de esta prueba corresponderá a la relación documental de los esquemas, ajustes,
      registros, configuraciones y documentos técnicos aplicables a los requerimientos generales de administración
      del sistema.
  - estilo: Normal
    texto: La información se presentará mediante una matriz de cumplimiento que identifique el requerimiento,
      el documento de soporte, la ubicación de la evidencia y el estatus de revisión.
  - estilo: Normal
    texto: 3.19. Prueba 42 - Capacidad Instalada Neta, carga máxima, secuencias de arranque y paro, y
      funcionamiento de sistemas de control, protección y servicios auxiliares
  - estilo: Normal
    texto: Objetivo
  - estilo: Normal
    texto: Documentar la evidencia operativa relacionada con la capacidad instalada neta, carga máxima,
      secuencias de arranque y paro, así como el funcionamiento de los sistemas de control, protección
      y servicios auxiliares de la Central Eléctrica.
  - estilo: Normal
    texto: Criterio de aceptación
  - estilo: Normal
    texto: La evidencia deberá demostrar operación satisfactoria y confiable conforme a los requerimientos
      aplicables del procedimiento de entrada en operación comercial.
  - estilo: Normal
    texto: 3.20. Prueba 43 - Operación en automático confiable
  - estilo: Normal
    texto: Objetivo
  - estilo: Normal
    texto: Documentar la operación confiable de la Central Eléctrica con los controles de los equipos
      y de la Central Eléctrica en modo automático.
  - estilo: Normal
    texto: Criterio de aceptación
  - estilo: Normal
    texto: La evidencia deberá demostrar operación confiable durante el periodo requerido, considerando
      las restricciones de falla permisibles y la disponibilidad de registros operativos.
  - estilo: Normal
    texto: 3.21. Prueba 44 - Verificación de capacidad instalada neta y consumos
  - estilo: Normal
    texto: Objetivo
  - estilo: Normal
    texto: Documentar la verificación de capacidad instalada neta y consumos asociados, cuando resulte
      aplicable al alcance de la Central Eléctrica y del Centro de Carga.
  - estilo: Normal
    texto: Criterio de aceptación
  - estilo: Normal
    texto: La evidencia deberá permitir validar la capacidad y los consumos conforme a los datos operativos
      registrados y a la documentación técnica de soporte.
  - estilo: Normal
    texto: 3.22. Prueba 45 - Requerimientos de Calidad de la Potencia
  - estilo: Normal
    texto: Objetivo
  - estilo: Normal
    texto: Documentar el cumplimiento de los requerimientos de calidad de la potencia mediante registros
      de medición en el Punto de Interconexión o Punto de Conexión, según corresponda al alcance del proyecto.
  - estilo: Normal
    texto: Criterio de aceptación
  - estilo: Normal
    texto: La evidencia deberá incluir mediciones de al menos 10 días consecutivos y el análisis de cumplimiento
      de los parámetros aplicables.
  - estilo: Normal
    texto: 3.23. Pruebas por Centro de Carga
  - estilo: Normal
    texto: Objetivo
  - estilo: Normal
    texto: Integrar, cuando corresponda, las pruebas y verificaciones aplicables al Centro de Carga asociado,
      incluyendo calidad de la potencia, factor de potencia, tensión, frecuencia, protecciones, control,
      intercambio de información y modelos de simulación conforme al Código de Red.
  - estilo: Normal
    texto: Nota
  - estilo: Normal
    texto: Este apartado queda reservado para completar la evidencia específica del Centro de Carga con
      base en la información operativa y documental disponible.
