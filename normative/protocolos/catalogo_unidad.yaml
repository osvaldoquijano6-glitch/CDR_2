  - estilo: Normal
    texto: La evidencia de esta prueba corresponderá al registro de la condición previa, el instante de
      transferencia entre canales y la respuesta del sistema de excitación durante el cambio de canal.
  - estilo: Normal
    texto: El registro permitirá evaluar la diferencia entre las señales de seguimiento y confirmar que
      la transferencia se realiza con un error menor al 1%, manteniendo estabilidad en el voltaje del
      generador y continuidad en la operación del sistema de excitación.
