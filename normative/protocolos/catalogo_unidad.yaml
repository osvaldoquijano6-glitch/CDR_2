  - estilo: List Paragraph
    texto: Medir el tiempo requerido desde el inicio de la secuencia de desexcitación hasta alcanzar tensión
      cero o la condición final definida por el sistema.
  - estilo: List Paragraph
    texto: Verificar que ambas secuencias se ejecuten de forma ordenada, sin bloqueos, sin alarmas anormales
