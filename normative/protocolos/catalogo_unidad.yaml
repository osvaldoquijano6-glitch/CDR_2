  - estilo: Normal
    texto: Criterio de aceptación
  - estilo: Normal
    texto: 'La prueba se considera satisfactoria cuando la transferencia entre canales y UCE’s se realiza
      correctamente, manteniendo un error de transferencia menor al:'
  - estilo: Normal
