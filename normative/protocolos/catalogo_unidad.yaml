- seccion: '19'
  titulo: Rechazo de Carga
  no_aplica_en_plantilla: false
  flujo:
  - estilo: Normal
    texto: Objetivo
  - estilo: p1
    texto: Esta prueba verifica la respuesta de la Unidad de Generación ante una condición de rechazo
      de carga, comprobando que el sistema de control de velocidad y excitación mantenga a la unidad en
      una condición estable posterior a la pérdida súbita de carga.
  - estilo: p1
    texto: El criterio de evaluación se toma del Anexo 5 del Procedimiento de Operación para la Declaración
      de Entrada en Operación Comercial de Centrales Eléctricas y Centros de Carga, en el apartado de
      pruebas por unidad para Centrales Eléctricas Síncronas, donde se establece la prueba de Rechazo
      de Carga, considerando como criterio que la unidad quede excitada, a velocidad nominal y con un
      tiempo de estabilización menor a 90 s.
  - estilo: p1
    texto: La prueba se enfoca en confirmar que, posterior al rechazo de carga, la unidad conserva condiciones
      operativas adecuadas, sin pérdida de excitación, sin sobrevelocidad sostenida, sin oscilaciones
      anormales y sin actuación indebida de protecciones.
  - estilo: Normal
    texto: Condiciones y desarrollo de la prueba
  - estilo: List Paragraph
    texto: Verificar que la unidad se encuentre sincronizada, en operación estable y con carga conforme
      a la condición definida para la prueba.
  - estilo: List Paragraph
    texto: Registrar la condición inicial de operación, incluyendo potencia activa, frecuencia, voltaje
      del generador y corriente de campo.
  - estilo: List Paragraph
    texto: Ejecutar la maniobra de rechazo de carga conforme al procedimiento operativo establecido.
  - estilo: List Paragraph
    texto: Registrar la respuesta transitoria de la unidad posterior a la pérdida súbita de carga.
  - estilo: List Paragraph
    texto: Verificar la evolución de la frecuencia, velocidad del rotor, voltaje del generador y corriente
      de campo durante el evento.
  - estilo: List Paragraph
    texto: Medir el tiempo requerido para que la unidad alcance una condición estable posterior al rechazo
      de carga.
  - estilo: List Paragraph
    texto: Confirmar que la unidad permanezca excitada y alcance nuevamente una condición cercana a velocidad
      nominal.
  - estilo: List Paragraph
    texto: Verificar que no se presenten oscilaciones anormales, pérdida de control del sistema de velocidad
      o excitación, ni actuación indebida de protecciones.
  - estilo: Normal
    texto: Señales requeridas
  - estilo: Normal
    texto: Potencia activa (P)
  - estilo: Normal
    texto: Frecuencia (f)
  - estilo: Normal
    texto: Velocidad del rotor
  - estilo: Normal
    texto: Voltaje de generador (Vg)
  - estilo: Normal
    texto: Corriente de campo (If)
  - estilo: Normal
    texto: Estado del interruptor / señal de rechazo de carga
  - estilo: Normal
    texto: Para recabar la información de la prueba se utilizará un adquisidor de datos HIOKI MR8847A,
      mediante el cual se registrarán las señales eléctricas requeridas durante la ejecución de la prueba,
      con capacidad de muestreo mínima de 20 muestras por segundo, equivalente a un intervalo de 50 ms
      por señal.
  - estilo: Normal
    texto: Criterio de aceptación
  - estilo: Normal
    texto: 'La prueba se considera satisfactoria cuando, posterior al rechazo de carga, la unidad permanece
      excitada, alcanza condición de velocidad nominal y se estabiliza en un tiempo menor a:'
  - estilo: Normal
    texto: sin pérdida de control ni actuación indebida de protecciones.
  - estilo: Normal
    texto: Resultados de la prueba
  - estilo: Normal
    texto: La evidencia de esta prueba corresponderá al registro de potencia activa, frecuencia, velocidad
      del rotor, voltaje del generador, corriente de campo y estado del interruptor durante el evento
      de rechazo de carga.
  - estilo: Normal
    texto: La información presentada permitirá verificar la respuesta transitoria de la unidad, el tiempo
      de estabilización posterior al evento y la permanencia de la unidad excitada y a velocidad nominal.
