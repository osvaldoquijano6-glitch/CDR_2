      pruebas por unidad para Centrales Eléctricas Síncronas, donde se establece la prueba de Escalones
      de Potencia (10% de Pnom), considerando como parámetros de evaluación el sobrepaso (SP) y el tiempo
      de estabilización (Ts).
  - estilo: p1
    texto: La prueba se enfoca en comprobar que el sistema de control de carga de la unidad responda de
      forma estable ante incrementos y decrementos de potencia, sin oscilaciones anormales, pérdida de
      control o actuación indebida de protecciones.
