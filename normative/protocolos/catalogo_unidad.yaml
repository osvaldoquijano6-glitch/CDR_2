- seccion: '3'
  titulo: Limitador V/Hz
  no_aplica_en_plantilla: false
  flujo:
  - estilo: Normal
    texto: Aplicabilidad de las Pruebas
  - tabla: aplicabilidad
  - estilo: Normal
    texto: Objetivo
  - estilo: p1
    texto: Esta prueba verifica el funcionamiento del limitador Volts/Hertz (V/Hz) de la Unidad de Generación,
      asociado a la protección contra sobreflujo magnético del generador. El propósito es comprobar que
      el sistema limite la excitación y mantenga la relación V/Hz dentro del rango permitido.
  - estilo: p1
    texto: El criterio de evaluación se toma del Anexo 5 del Procedimiento de Operación para la Declaración
      de Entrada en Operación Comercial de Centrales Eléctricas y Centros de Carga, en el apartado de
      pruebas por unidad para Centrales Eléctricas Síncronas, donde se establece la prueba de Limitador
      V/Hz con un rango de actuación de 1.07 a 1.12 pu.
  - estilo: p1
    texto: La prueba se vincula técnicamente con los requerimientos del sistema de excitación y control
      de tensión establecidos para Centrales Eléctricas Síncronas tipo B, ya que el limitador V/Hz forma
      parte de las funciones de protección y limitación asociadas al Regulador Automático de Tensión (AVR/RAT)
      y al sistema de excitación del generador.
  - estilo: Normal
    texto: Condiciones y desarrollo de la prueba
  - estilo: List Paragraph
    texto: Verificar que la unidad se encuentre en operación estable, con el sistema de excitación habilitado
      y el AVR en modo automático.
  - estilo: List Paragraph
    texto: Registrar la condición inicial de operación de la unidad, incluyendo voltaje en terminales
      del generador y frecuencia.
  - estilo: List Paragraph
    texto: Con el generador estabilizado, reducir gradualmente la frecuencia simulada de forma controlada.
  - estilo: List Paragraph
    texto: Evaluar la relación V/Hz durante cada punto de frecuencia definido.
  - estilo: List Paragraph
    texto: Registrar los valores de voltaje, frecuencia y relación V/Hz en los puntos de 60 Hz, 59 Hz,
      58 Hz y 57 Hz.
  - estilo: List Paragraph
    texto: Verificar la actuación del limitador V/Hz conforme al ajuste configurado en el sistema de excitación.
  - estilo: List Paragraph
    texto: Regresar la unidad a condiciones nominales de operación.
  - estilo: List Paragraph
    texto: Confirmar que la unidad mantenga una respuesta estable, sin pérdida de control del AVR, sin
      oscilaciones anormales y sin actuación indebida de protecciones no asociadas a la prueba.
  - estilo: Normal
    texto: Señales requeridas
  - estilo: List Paragraph
    texto: Voltaje de generador (Vg)
  - estilo: List Paragraph
    texto: Frecuencia (f)
  - estilo: List Paragraph
    texto: Relación V/Hz
  - estilo: List Paragraph
    texto: Activación del limitador V/Hz
  - estilo: Normal
    texto: Para recabar la información de la prueba se utilizará un adquisidor de datos HIOKI MR8847A
      y el analizador de redes correspondiente, mediante los cuales se registrarán las señales eléctricas
      requeridas durante la ejecución de la prueba.
  - estilo: Normal
    texto: Criterio de aceptación
  - estilo: Normal
    texto: 'La prueba se considera satisfactoria cuando la relación V/Hz se mantiene dentro del siguiente
      rango de actuación:'
  - estilo: Normal
    texto: Resultados de la prueba
  - estilo: Normal
    texto: Los resultados se registrarán posterior a la medición en campo, considerando los valores de
      voltaje, frecuencia, relación V/Hz y condición de actuación del limitador en cada punto evaluado.
  - estilo: Normal
    texto: La información obtenida permitirá verificar que el limitador mantiene la relación V/Hz dentro
      del rango de 1.07 a 1.12 pu, así como confirmar la estabilidad del sistema de excitación durante
      la prueba.
  - estilo: Normal
    texto: La evidencia de la prueba se presentará en formato tabular y gráfico para sustentar la evaluación
      correspondiente.
  - placeholder: 'Gráfica: Característica V/Hz del Limitador — CNK

      [Espacio reservado para gráfica / captura]'
  - estilo: Subtitle
    texto: Figura 1.5 Característica V/Hz del Limitador
- seccion: '4.1'
  titulo: Secuencia Exc y Desexc Auto
  no_aplica_en_plantilla: false
  flujo:
  - tabla: aplicabilidad
  - estilo: Normal
    texto: Objetivo
  - estilo: p1
    texto: Esta prueba verifica que la secuencia automática de excitación y desexcitación del generador
      se realice de forma ordenada, segura y conforme a la lógica operativa del sistema de excitación.
  - estilo: p1
    texto: El criterio de evaluación se toma del Anexo 5 del Procedimiento de Operación para la Declaración
      de Entrada en Operación Comercial de Centrales Eléctricas y Centros de Carga, en el apartado de
      pruebas por unidad para Centrales Eléctricas Síncronas, donde se establece la verificación de la
      Secuencia Excitación–Desexcitación del sistema de control de tensión.
  - estilo: p1
    texto: La prueba se vincula técnicamente con la correcta operación del sistema de excitación del generador,
      al validar que las órdenes automáticas de excitación y desexcitación se ejecuten en la secuencia
      esperada, sin pérdida de control, sin condiciones anormales y sin actuación indebida de protecciones.
  - estilo: Normal
    texto: Condiciones y desarrollo de la prueba
  - estilo: List Paragraph
    texto: Verificar que el generador se encuentre parado o en condición segura para inicio de secuencia,
      conforme a la condición operativa definida para la prueba.
  - estilo: List Paragraph
    texto: Confirmar que el sistema de excitación se encuentre disponible y habilitado para operación
      automática.
  - estilo: List Paragraph
    texto: Iniciar la secuencia automática de excitación del generador.
  - estilo: List Paragraph
    texto: Registrar el comportamiento del voltaje en terminales del generador y la corriente de campo
      durante la secuencia.
