    texto: Para recabar la información de la prueba se utilizará un adquisidor de datos HIOKI MR8847A,
      mediante el cual se registrarán las señales requeridas durante la ejecución de la prueba, con capacidad
      de muestreo mínima de 20 muestras por segundo, equivalente a un intervalo de 50 ms por señal.
