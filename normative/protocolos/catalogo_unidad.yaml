  no_aplica_en_plantilla: false
  flujo:
  - tabla: aplicabilidad
  - estilo: Normal
    texto: Objetivo
  - estilo: p1
    texto: Esta prueba verifica que, ante la activación de un paro de emergencia, la secuencia de desexcitación
      del generador se ejecute de forma ordenada y segura hasta alcanzar la condición final definida por
      el sistema.
  - estilo: p1
    texto: El criterio de evaluación se toma del Anexo 5 del Procedimiento de Operación para la Declaración
      de Entrada en Operación Comercial de Centrales Eléctricas y Centros de Carga, en el apartado de
      pruebas por unidad para Centrales Eléctricas Síncronas, donde se considera la verificación de la
      secuencia de excitación y desexcitación.
  - estilo: p1
    texto: La prueba se enfoca en confirmar la respuesta del sistema de excitación ante una condición
      de emergencia, verificando la descarga del campo, la reducción del voltaje del generador y la correcta
      ejecución de las señales asociadas al paro.
  - estilo: Normal
    texto: Condiciones y desarrollo de la prueba
  - estilo: List Paragraph
    texto: Verificar que el generador se encuentre operando en condiciones nominales o en la condición
      definida para la prueba.
  - estilo: List Paragraph
    texto: Confirmar que el sistema de excitación se encuentre habilitado y operando correctamente.
  - estilo: List Paragraph
    texto: Registrar la condición inicial de operación, incluyendo voltaje en terminales del generador
      y corriente de campo.
  - estilo: List Paragraph
    texto: Activar la señal de paro de emergencia conforme al procedimiento operativo establecido.
  - estilo: List Paragraph
    texto: Registrar la secuencia completa de desexcitación posterior a la activación del paro.
  - estilo: List Paragraph
    texto: Medir el tiempo transcurrido desde la activación del paro de emergencia hasta la condición
      final de desexcitación.
  - estilo: List Paragraph
    texto: Verificar la reducción del voltaje del generador y de la corriente de campo durante la secuencia.
  - estilo: List Paragraph
    texto: Confirmar la apertura del interruptor principal o la condición final definida por la lógica
      de protección y control.
  - estilo: List Paragraph
    texto: Verificar que la secuencia se ejecute sin bloqueos, sin operación incompleta y sin condiciones
      anormales adicionales.
