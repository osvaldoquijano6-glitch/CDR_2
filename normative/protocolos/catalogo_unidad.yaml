  - estilo: Normal
    texto: Resultados de la prueba
  - estilo: Normal
    texto: La evidencia de esta prueba corresponderá al registro de la frecuencia simulada, frecuencia
      real, potencia activa, velocidad del rotor y voltaje del generador durante los escalones aplicados
      dentro y fuera de la banda muerta.
  - estilo: Normal
    texto: La información presentada permitirá verificar la actuación de la banda muerta de ±30 mHz y
      la respuesta de potencia activa asociada al 5% de estatismo, confirmando la correcta operación del
      modo de control de frecuencia.
