- seccion: '9'
  titulo: Compensador de Reactivos
  no_aplica_en_plantilla: false
  flujo:
  - tabla: aplicabilidad
  - estilo: Normal
    texto: Objetivo
  - estilo: p1
    texto: Esta prueba verifica el funcionamiento del compensador de reactivos del AVR/RAT, evaluando
      la respuesta del sistema de control de tensión ante distintos ajustes de compensación.
  - estilo: p1
    texto: El criterio de evaluación se toma del Anexo 5 del Procedimiento de Operación para la Declaración
      de Entrada en Operación Comercial de Centrales Eléctricas y Centros de Carga, en el apartado de
      pruebas por unidad para Centrales Eléctricas Síncronas, donde se establece la prueba de Compensador
      de MVAr con un rango de evaluación de ±12%.
  - estilo: p1
    texto: La prueba permite confirmar que el AVR modifica adecuadamente su referencia de control en función
      del ajuste del compensador de reactivos, manteniendo una respuesta estable del voltaje del generador
      y de la potencia reactiva.
  - estilo: Normal
    texto: Condiciones y desarrollo de la prueba
  - estilo: Normal
    texto: 1. Verificar que la unidad se encuentre en operación estable, con carga y con el AVR en modo
      automático.
  - estilo: Normal
    texto: 2. Registrar la condición inicial de operación, incluyendo voltaje en terminales del generador,
      potencia reactiva y ajuste inicial del compensador.
  - estilo: Normal
    texto: 3. Ajustar el compensador de reactivos al valor de 0% y registrar la condición estable.
  - estilo: Normal
    texto: 4. Ajustar el compensador a +4%, +8% y +12%, cuando el diseño del AVR lo permita, registrando
      la respuesta del sistema en cada punto.
  - estilo: Normal
    texto: 5. Ajustar el compensador a –4%, –8% y –12%, registrando la respuesta del sistema en cada punto.
  - estilo: Normal
    texto: 6. Verificar la variación del voltaje del generador respecto al valor esperado para cada ajuste
      del compensador.
  - estilo: Normal
    texto: 7. Confirmar que la unidad mantenga una operación estable, sin pérdida de control del AVR,
      sin oscilaciones anormales y sin actuación indebida de protecciones.
  - estilo: Normal
    texto: 8. En caso de que algún rango de ajuste no sea soportado por diseño del AVR, documentar la
      condición observada y justificar su exclusión dentro de los resultados.
  - estilo: Normal
    texto: Señales requeridas
  - estilo: List Paragraph
    texto: Voltaje de generador (Vg)
  - estilo: List Paragraph
    texto: "Potencia reactiva \n(Q)"
  - estilo: List Paragraph
    texto: Ajuste del compensador (%)
  - estilo: Normal
    texto: Para recabar la información de la prueba se utilizará un adquisidor de datos HIOKI MR8847A,
      mediante el cual se registrarán las señales eléctricas requeridas durante la ejecución de la prueba,
      con capacidad de muestreo mínima de 20 muestras por segundo, equivalente a un intervalo de 50 ms
      por señal.
  - estilo: Normal
    texto: Criterio de aceptación
  - estilo: Normal
    texto: 'La prueba se considera satisfactoria cuando el voltaje del generador presenta una variación
      dentro de la tolerancia permitida para cada ajuste del compensador:'
  - estilo: Normal
    texto: Resultados de la prueba
  - estilo: Normal
    texto: La evidencia de esta prueba corresponderá al registro del voltaje del generador, potencia reactiva
      y ajuste del compensador en cada punto evaluado.
  - estilo: Normal
    texto: La información obtenida permitirá verificar que el compensador de reactivos responde conforme
      a los ajustes aplicados y que la variación del voltaje se mantiene dentro de la tolerancia establecida.
  - estilo: Normal
    texto: En caso de que el diseño del AVR no permita operar en ajustes positivos del compensador, dicha
      condición será documentada como parte de la evaluación, indicando el comportamiento observado, tal
      como inestabilidad o pérdida de control en dichos ajustes.
  - placeholder: 'Gráfica: Compensador de Reactivos — CNK

      [Espacio reservado para gráfica / captura]'
  - estilo: Subtitle
    texto: Figura 1.7 Compensador de Reactivos
