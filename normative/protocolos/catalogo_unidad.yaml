pruebas:
- grupo: Sistema de Control de Tensión, Pruebas en Vacio
- seccion: '1'
  titulo: Rango Operativo de Tensión
  no_aplica_en_plantilla: false
  flujo:
  - tabla: aplicabilidad
  - estilo: Normal
    texto: Objetivo
  - estilo: p1
    texto: Esta prueba verifica que la Unidad de Generación mantenga el voltaje en terminales del generador
      dentro del rango operativo permitido, mediante la actuación del Regulador Automático de Tensión
      (AVR/RAT).
  - estilo: p1
    texto: El criterio de evaluación se toma del Anexo 5 del Procedimiento de Operación para la Declaración
      de Entrada en Operación Comercial de Centrales Eléctricas y Centros de Carga, en el apartado de
      pruebas por unidad para Centrales Eléctricas Síncronas, donde se establece la prueba de Rango Operativo
      de Tensión con el criterio de control dentro del rango 90% < V < 110%.
  - estilo: p1
    texto: Asimismo, la prueba se sustenta dentro del Código de Red 2.0, particularmente con el Manual
      Regulatorio de Requerimientos Técnicos para la Interconexión de Centrales Eléctricas al Sistema
      Eléctrico Nacional, Capítulo 3, relativo a los requerimientos de interconexión ante variaciones
      de tensión, y con la Sección 3.2.2, correspondiente al sistema de control de tensión para Centrales
      Eléctricas Síncronas tipo B.
  - estilo: Normal
    texto: Condiciones y desarrollo de la prueba
  - estilo: List Paragraph
    texto: Verificar que la unidad se encuentre en operación estable, con el sistema de excitación habilitado
      y el AVR en modo automático.
  - estilo: List Paragraph
    texto: Ajustar la consigna de voltaje conforme a las condiciones operativas definidas para la prueba.
  - estilo: List Paragraph
    texto: Registrar la condición inicial de operación de la unidad, incluyendo voltaje en terminales
      del generador, potencia activa y frecuencia.
  - estilo: List Paragraph
    texto: Modificar la consigna del AVR para comprobar la capacidad de control del voltaje en terminales
      del generador dentro del rango permitido.
  - estilo: List Paragraph
    texto: Ejecutar la prueba en condición de vacío y, cuando aplique, en diferentes puntos de carga.
  - estilo: List Paragraph
    texto: Registrar al menos tres condiciones representativas de operación, cuando la prueba se realice
      con carga.
  - estilo: List Paragraph
    texto: Verificar que la respuesta del generador sea estable durante cada punto evaluado, sin pérdida
      de control del AVR, sin oscilaciones anormales y sin actuación indebida de protecciones.
  - estilo: List Paragraph
    texto: Confirmar que el voltaje en terminales del generador permanezca dentro del rango operativo
      requerido durante toda la prueba.
  - estilo: Normal
    texto: Señales requeridas
  - estilo: List Paragraph
    texto: Voltaje de generador (Vg)
  - estilo: List Paragraph
    texto: Potencia activa (P)
  - estilo: List Paragraph
    texto: Frecuencia (f)
  - estilo: Normal
    texto: Para recabar la información de la prueba se utilizará un adquisidor de datos HIOKI MR8847A,
      mediante el cual se registrarán las señales eléctricas requeridas durante la ejecución de la prueba,
      con capacidad de muestreo mínima de 20 muestras por segundo, equivalente a un intervalo de 50 ms
      por señal.
  - estilo: Normal
    texto: Criterio de aceptación
  - estilo: Normal
    texto: 'La prueba se considera satisfactoria cuando el voltaje en terminales del generador permanece
      dentro del siguiente rango:'
  - estilo: Normal
    texto: Resultados de la prueba
  - estilo: Normal
    texto: Los resultados de la prueba deberán registrarse una vez ejecutada la medición en campo, documentando
      los valores obtenidos de voltaje en terminales del generador, potencia activa, frecuencia y, en
      caso de estar disponible, la consigna aplicada al AVR.
  - estilo: Normal
    texto: La información registrada deberá permitir verificar que la unidad mantiene el voltaje en terminales
      dentro del rango permitido de 0.90 a 1.10 pu, sin pérdida de control del AVR, sin oscilaciones anormales
      y sin actuación indebida de protecciones.
  - estilo: Normal
    texto: Una vez concluida la prueba, los resultados se integrarán en formato tabular y gráfico para
      sustentar la evaluación del cumplimiento.
  - placeholder: 'Gráfica: Desempeño del control de tensión —CNK

      [Espacio reservado para gráfica / captura]'
  - estilo: Normal
    texto: Figura 1.2 Desempeño del control de tensión
- seccion: '2.1'
  titulo: Escalón de Tensión 5%
  no_aplica_en_plantilla: false
  flujo:
  - tabla: aplicabilidad
  - estilo: Normal
    texto: Objetivo
  - estilo: p1
    texto: Esta prueba verifica la respuesta dinámica del sistema de control de excitación de la Unidad
      de Generación ante cambios escalonados de ±5% en la consigna de voltaje, con el AVR/RAT en modo
      automático.
  - estilo: p1
    texto: El criterio de evaluación se toma del Anexo 5 del Procedimiento de Operación para la Declaración
      de Entrada en Operación Comercial de Centrales Eléctricas y Centros de Carga, en el apartado de
      pruebas por unidad para Centrales Eléctricas Síncronas, donde se establece la prueba de Escalón
      de Tensión para el sistema de control de tensión.
  - estilo: p1
    texto: La prueba se sustenta dentro del Código de Red 2.0, particularmente en el Manual Regulatorio
      de Requerimientos Técnicos para la Interconexión de Centrales Eléctricas al Sistema Eléctrico Nacional,
      Capítulo 3, relativo a los requerimientos de interconexión ante variaciones de tensión, y en la
      Sección 3.2.2, correspondiente al sistema de control de tensión para Centrales Eléctricas Síncronas
      tipo B.
  - estilo: Normal
    texto: Para el protocolo se documentan escalones de tensión de ±5% y ±10%. En caso de que CENACE,
      el fabricante o el procedimiento específico solicite una verificación adicional de ±20%, esta deberá
      integrarse como prueba complementaria previa validación de los límites operativos del AVR y de la
      unidad generadora.
  - estilo: Normal
    texto: Condiciones y desarrollo de la prueba
  - estilo: List Paragraph
    texto: Verificar que la unidad se encuentre sincronizada, en operación estable y con el AVR en modo
      automático.
  - estilo: List Paragraph
    texto: Operar el generador aproximadamente al 50% de carga nominal, conforme a las condiciones operativas
      disponibles para la prueba.
  - estilo: List Paragraph
    texto: Registrar la condición inicial de operación de la unidad, incluyendo voltaje en terminales
      del generador, corriente de campo y potencia reactiva.
  - estilo: List Paragraph
    texto: Con el generador estabilizado, aplicar un escalón positivo de +5% sobre la consigna de voltaje.
  - estilo: List Paragraph
    texto: Registrar la respuesta dinámica del sistema de excitación hasta que el voltaje del generador
      alcance una condición estable.
  - estilo: List Paragraph
    texto: Una vez estabilizada la respuesta, aplicar un escalón negativo de –5% sobre la consigna de
      voltaje.
  - estilo: List Paragraph
    texto: Registrar nuevamente la respuesta dinámica del sistema hasta alcanzar una condición estable.
  - estilo: List Paragraph
    texto: 'Determinar los parámetros de desempeño de la respuesta: tiempo de respuesta (Tr), tiempo de
      estabilización (Ts), sobrepaso (SP) y constante de amortiguamiento (ε).'
  - estilo: Normal
    texto: Para efectos de esta evaluación, ε corresponde al coeficiente de amortiguamiento de la respuesta
      dinámica del sistema de excitación; se utiliza para verificar que las oscilaciones posteriores al
      escalón se atenúan dentro del rango permitido.
  - estilo: List Paragraph
    texto: Verificar que la respuesta del sistema sea estable, sin oscilaciones anormales, sin pérdida
      de control del AVR y sin actuación indebida de protecciones.
  - estilo: Normal
    texto: Señales requeridas
  - estilo: List Paragraph
    texto: Voltaje de generador (Vg)
  - estilo: List Paragraph
    texto: Corriente de campo (If)
  - estilo: List Paragraph
    texto: "Potencia reactiva \n(Q)"
  - estilo: Normal
    texto: Para recabar la información de la prueba se utilizará un adquisidor de datos HIOKI MR8847A,
      mediante el cual se registrarán las señales eléctricas requeridas durante la ejecución de la prueba,
      con capacidad de muestreo mínima de 20 muestras por segundo, equivalente a un intervalo de 50 ms
      por señal.
  - estilo: Normal
    texto: Criterio de aceptación
  - estilo: Normal
    texto: 'La prueba se considera satisfactoria cuando los parámetros de respuesta dinámica se encuentran
      dentro de los siguientes límites:'
  - estilo: Normal
    texto: 'Tiempo de respuesta (Tr): Tr < 0.25 s para sistema estático; Tr < 0.5 s para sistema brushless.'
  - estilo: Normal
    texto: 'Tiempo de estabilización (Ts): 0.7 s < Ts < 1.0 s para sistema estático; Ts < 2.0 s para sistema
      brushless.'
  - estilo: Normal
    texto: 'Sobrepaso (SP): SP < 15%.'
  - estilo: Normal
    texto: 'Coeficiente de amortiguamiento (ε):'
  - estilo: Normal
    texto: 0.5 ≤ ε ≤ 1.0.
  - estilo: Normal
    texto: Resultados de la prueba
  - estilo: Normal
    texto: Los resultados se registrarán una vez ejecutada la medición en campo, documentando la respuesta
      dinámica del sistema de excitación ante el escalón positivo de +5% y el escalón negativo de –5%
      en la consigna de voltaje.
  - estilo: Normal
    texto: La información obtenida permitirá determinar el tiempo de respuesta (Tr), tiempo de estabilización
      (Ts), sobrepaso (SP) y constante de amortiguamiento (ε), con el propósito de verificar su cumplimiento
      respecto a los criterios de aceptación establecidos.
  - placeholder: 'Gráfica: Escalón de Tensión +5% — CNK

      [Espacio reservado para gráfica / captura]'
  - estilo: Subtitle
    texto: Figura 1.3 Escalón de Tensión +5%
