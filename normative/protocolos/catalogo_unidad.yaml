    texto: Criterio de aceptación
  - estilo: Normal
    texto: La prueba se considera satisfactoria cuando la secuencia automática de excitación y desexcitación
      se realiza de manera ordenada y correcta, conforme a la lógica operativa del sistema de excitación,
      sin interrupciones anormales, sin pérdida de control y sin actuación indebida de protecciones.
  - estilo: Normal
    texto: Resultados de la prueba
  - estilo: Normal
    texto: La evidencia de esta prueba corresponderá al registro temporal de la secuencia automática de
      excitación y desexcitación del generador, identificando el instante de inicio de cada orden, la
      evolución del voltaje en terminales y la corriente de campo hasta alcanzar la condición final correspondiente.
  - estilo: Normal
    texto: Para la excitación automática, se documentará el tiempo requerido para alcanzar la tensión
      nominal del generador. Para la desexcitación automática, se documentará el tiempo requerido para
      llevar el voltaje del generador a la condición de tensión cero o al valor final definido por el
      sistema.
  - estilo: Normal
    texto: Los registros permitirán confirmar que ambas secuencias se ejecutan de forma ordenada, sin
      bloqueos, alarmas anormales, pérdida de control del sistema de excitación o actuación indebida de
