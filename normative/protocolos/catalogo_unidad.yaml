  - estilo: Normal
    texto: El registro deberá permitir identificar el tiempo de desexcitación, la evolución del voltaje
      en terminales, la corriente de campo y la condición del interruptor principal o señal final asociada
      a la secuencia.
  - estilo: Normal
    texto: La información presentada permitirá confirmar que la desexcitación por paro de emergencia se
