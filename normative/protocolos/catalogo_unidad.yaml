- seccion: '5'
  titulo: Seguidor Auto entre Canales y UCE's
  no_aplica_en_plantilla: false
  flujo:
  - tabla: aplicabilidad
  - estilo: Normal
    texto: Objetivo
  - estilo: p1
    texto: Esta prueba verifica la correcta operación de la función Seguidor Automático entre canales
      del sistema de excitación y entre las Unidades de Control de Excitación, con el propósito de confirmar
      que la transferencia entre canales se realice sin desviaciones significativas en la referencia de
      control.
  - estilo: p1
    texto: El criterio de evaluación se toma del Anexo 5 del Procedimiento de Operación para la Declaración
      de Entrada en Operación Comercial de Centrales Eléctricas y Centros de Carga, en el apartado de
      pruebas por unidad para Centrales Eléctricas Síncronas, donde se establece la verificación del Seguidor
      Auto entre canales y UCE’s, considerando como criterio que el error al transferir sea menor al 1%.
  - estilo: p1
    texto: La prueba se enfoca en comprobar que los canales de control del sistema de excitación mantengan
      seguimiento entre sí, permitiendo una transferencia automática o manual sin cambios bruscos en el
      voltaje del generador ni pérdida de control del AVR.
  - estilo: Normal
    texto: Condiciones y desarrollo de la prueba
  - estilo: List Paragraph
    texto: Verificar que la unidad se encuentre en operación estable, con el sistema de excitación habilitado
      y el AVR en modo automático.
  - estilo: List Paragraph
    texto: Confirmar que los canales de control del sistema de excitación se encuentren disponibles y
      sin alarmas activas.
  - estilo: List Paragraph
    texto: Registrar la condición inicial de operación, incluyendo voltaje en terminales del generador,
      corriente de campo y canal activo del AVR.
  - estilo: List Paragraph
    texto: Verificar el seguimiento entre el canal activo y el canal en reserva, observando la diferencia
      entre sus señales de referencia o salida.
  - estilo: List Paragraph
    texto: Ejecutar la transferencia entre canales conforme al procedimiento operativo del sistema de
      excitación.
  - estilo: List Paragraph
    texto: Registrar el comportamiento del voltaje del generador, corriente de campo y señal de canal
      activo durante la transferencia.
  - estilo: List Paragraph
    texto: Verificar que la transferencia se realice sin variaciones bruscas, sin pérdida de control del
      AVR y sin actuación indebida de protecciones.
  - estilo: List Paragraph
    texto: Determinar el error de transferencia entre canales y confirmar que se mantenga dentro del criterio
      permitido.
